<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weekly Structure — Project Clarity</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<script src="../shared/clients.js"></script>
<script>
  /* =====================================================================
     Weekly Structure — a template view of an ideal Mon–Sun week.
     Storage namespace 'weekly' so it stays separate from the Personal
     Planner (id 'vpm'). Keys are weekday slugs (mon/tue/.../sun) so the
     content represents a recurring template, not a specific calendar week.
     ===================================================================== */
  window.CLIENT_DATA = {
    id:       'weekly',
    name:     'Weekly Structure',
    initials: 'WS',
    sub:      'Recurring weekly template',
  };
</script>
<script src="../shared/sync.js"></script>
<style>
  :root {
    --bg:        #f6f1e2;
    --surface:   #ffffff;
    --ink:       #2b2f3a;
    --ink-mute:  #6b7080;
    --line:      #ebe6d4;
    --accent:    #2960ff;
    --accent-bg: #dde7ff;
    --today-bg:  #eef2ff;
    --weekend:   #fbf6e7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 15px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 1480px;
    margin: 0 auto;
    padding: 64px 24px 80px;
  }

  .ws-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .ws-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
  }
  .ws-title {
    font-size: 26px;
    font-weight: 700;
    margin: 4px 0 0;
    letter-spacing: -0.01em;
  }
  .ws-sub {
    color: var(--ink-mute);
    font-size: 13px;
    margin: 4px 0 0;
  }
  .ws-clear {
    appearance: none;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 12px;
    font: 500 12px/1 'Poppins', sans-serif;
    letter-spacing: 0.02em;
    color: var(--ink-mute);
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
  }
  .ws-clear:hover {
    background: rgba(184,96,64,0.06);
    color: #b86040;
    border-color: rgba(184,96,64,0.3);
  }

  .ws-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    border-left: 1px solid var(--line);
    border-top: 1px solid var(--line);
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
  }
  .ws-col {
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    min-height: 520px;
  }
  .ws-col.is-weekend { background: var(--weekend); }
  .ws-col.is-today   { background: var(--today-bg); }
  .ws-col-head {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--line);
    text-align: center;
    background: rgba(255,255,255,0.5);
  }
  .ws-col.is-today .ws-col-head { background: var(--today-bg); }
  .ws-dow {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-mute);
    font-weight: 600;
  }
  .ws-col.is-today .ws-dow { color: var(--accent); }
  .ws-body {
    flex: 1 1 auto;
    padding: 14px 14px 18px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink);
    outline: none;
    overflow-wrap: anywhere;
  }
  .ws-body:empty::before {
    content: attr(data-placeholder);
    color: #b8af96;
    font-style: italic;
  }
  .ws-body:focus-visible {
    background: rgba(41,96,255,0.04);
  }
  /* Allow simple rich text inside cells */
  .ws-body ul, .ws-body ol { padding-left: 18px; margin: 6px 0; }
  .ws-body li { margin: 2px 0; }
  .ws-body strong { font-weight: 600; }
  .ws-body em { font-style: italic; }

  @media (max-width: 900px) {
    .ws-grid { grid-template-columns: 1fr; }
    .ws-col { min-height: auto; border-right: 0; }
    .ws-col + .ws-col { border-top: 0; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="ws-head">
    <div>
      <div class="ws-eyebrow">Weekly Structure</div>
      <h1 class="ws-title">My ideal week</h1>
      <p class="ws-sub">Template only — same notes repeat every week. Use the Personal Planner for date-specific events.</p>
    </div>
    <button type="button" class="ws-clear" id="ws-clear-btn" title="Reset every day to empty">Reset week</button>
  </header>

  <div class="ws-grid" id="ws-grid"></div>
</div>

<script src="../shared/nav.js"></script>
<script>
(function bootWeekly() {
  const STORE_KEY = 'pc-ops::weekly::days::v1';
  const DAYS = [
    { key: 'mon', label: 'Monday',    weekend: false },
    { key: 'tue', label: 'Tuesday',   weekend: false },
    { key: 'wed', label: 'Wednesday', weekend: false },
    { key: 'thu', label: 'Thursday',  weekend: false },
    { key: 'fri', label: 'Friday',    weekend: false },
    { key: 'sat', label: 'Saturday',  weekend: true  },
    { key: 'sun', label: 'Sunday',    weekend: true  },
  ];
  const TODAY_DOW = (new Date().getDay() + 6) % 7; // 0 = Mon

  const gridEl = document.getElementById('ws-grid');
  const state  = load();

  function load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) return JSON.parse(raw) || {};
    } catch (_) {}
    return {};
  }
  function save() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (_) {}
  }
  function escape(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function render() {
    gridEl.innerHTML = DAYS.map((d, i) => {
      const cls = 'ws-col' + (d.weekend ? ' is-weekend' : '') + (i === TODAY_DOW ? ' is-today' : '');
      return `
        <div class="${cls}">
          <div class="ws-col-head">
            <div class="ws-dow">${escape(d.label)}</div>
          </div>
          <div class="ws-body" contenteditable="true" data-key="${d.key}" data-placeholder="What does ${escape(d.label)} look like…">${state[d.key] || ''}</div>
        </div>
      `;
    }).join('');
    wire();
  }

  function wire() {
    gridEl.querySelectorAll('.ws-body').forEach((el) => {
      el.addEventListener('input', () => {
        const k = el.dataset.key;
        const stripped = el.innerHTML.replace(/<br\s*\/?>/gi, '').trim();
        if (!stripped) delete state[k]; else state[k] = el.innerHTML;
        save();
      });
    });
  }

  document.getElementById('ws-clear-btn').addEventListener('click', () => {
    if (!confirm('Reset every day in this week template to empty?')) return;
    Object.keys(state).forEach((k) => delete state[k]);
    save();
    render();
  });

  render();
})();
</script>

</body>
</html>
