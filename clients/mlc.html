<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLC — Project Clarity</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<link rel="stylesheet" href="../shared/dashboard.css" />
<script src="../shared/clients.js"></script>
<script>
  /* =====================================================================
     MLC — client dashboard. Edit the data below to seed this client's
     board. After first load, edits persist in localStorage scoped by id
     and mirror cross-device via shared/sync.js.
     "Reset to template" snaps back to these starting values.
     ===================================================================== */
  window.CLIENT_DATA = {
    id:       'mlc',
    name:     'MLC',
    initials: 'ML',
    sub:      '',

    // Aliases used to match the "Client" custom field in ClickUp.
    clientAliases: ['Melbourne Leather Co', 'MLC'],

    heroImage: '../assets/mlc-hero.png',

    funnel: {
      spend: 4000,
      cpv:   0.68,
      cvr:   2.0,
      aov:   95,
      ret:   28,
      rov:   105,
    },

    campaigns: [],
    retainer:  [],
    tasks:     [],
    notes:     [],

    links: [
      { label: 'Klaviyo account',         url: '' },
      { label: 'ClickUp — campaign list', url: '' },
      { label: 'Claude project',          url: '' },
      { label: 'Brand guidelines',        url: '' },
    ],
  };
</script>
<script src="../shared/sync.js"></script>

<style>
  /* =====================================================================
     MLC — monthly notes cards. Appended below the Home tab's Notes box.
     Persists under pc-ops::mlc::months::v1 (auto-synced via sync.js).
     ===================================================================== */
  .mlc-months {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 18px;
  }
  .mlc-month {
    background: #fbf7e9;
    border: 1px solid #ebe2c8;
    border-radius: 12px;
    padding: 18px 22px 20px;
    transition: padding 160ms ease;
  }
  .mlc-month.is-collapsed { padding-bottom: 14px; }
  .mlc-month-head {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mlc-month-title {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex: 1 1 auto;
    min-width: 0;
  }
  .mlc-month-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.005em;
    color: #1f1f29;
    line-height: 1.1;
  }
  .mlc-month-year {
    font-size: 17px;
    color: #b0a78a;
    font-weight: 500;
  }
  .mlc-month-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mlc-month-x,
  .mlc-month-toggle {
    appearance: none;
    background: transparent;
    border: 0;
    color: #8a8676;
    cursor: pointer;
    width: 26px;
    height: 26px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 120ms ease, color 120ms ease;
    font-size: 18px;
    line-height: 1;
  }
  .mlc-month-x:hover { background: rgba(184,96,64,0.10); color: #b86040; }
  .mlc-month-toggle:hover { background: rgba(17,19,26,0.05); color: #2b2f3a; }
  .mlc-month-toggle svg { transition: transform 180ms ease; }
  .mlc-month.is-collapsed .mlc-month-toggle svg { transform: rotate(-180deg); }
  .mlc-month-body {
    margin-top: 10px;
    min-height: 28px;
    font-size: 14px;
    line-height: 1.55;
    color: #2b2f3a;
    outline: none;
  }
  .mlc-month-body:empty::before {
    content: attr(data-placeholder);
    color: #b0a78a;
    font-style: italic;
    pointer-events: none;
  }
  .mlc-month-body:focus-visible {
    box-shadow: 0 0 0 2px rgba(168,107,20,0.18);
    border-radius: 4px;
  }
  .mlc-month.is-collapsed .mlc-month-body { display: none; }
  .mlc-month-add {
    appearance: none;
    background: transparent;
    border: 1px dashed #d6cca8;
    color: #8a7340;
    padding: 12px 16px;
    border-radius: 12px;
    font: 600 11px/1 'Poppins', -apple-system, sans-serif;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
  }
  .mlc-month-add:hover {
    background: #faf5e2;
    border-color: #b89c4f;
    color: #6b4a13;
  }
</style>
</head>
<body>
<script src="../shared/dashboard.js"></script>
<script src="../shared/nav.js"></script>
<script>
  /* =====================================================================
     MLC monthly notes cards
     Mount below the existing Notes box on the Home panel.
     ===================================================================== */
  (function bootMlcMonths() {
    const STORE_KEY = 'pc-ops::mlc::months::v1';

    function init() {
      const panel = document.getElementById('panel-home');
      if (!panel) { setTimeout(init, 50); return; }
      if (panel.querySelector('.mlc-months')) return;

      const state = load();

      const wrap = document.createElement('div');
      wrap.className = 'mlc-months';
      panel.appendChild(wrap);

      function load() {
        try {
          const raw = localStorage.getItem(STORE_KEY);
          if (raw) return normalize(JSON.parse(raw));
        } catch (_) {}
        return seedDefault();
      }
      function save() {
        try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (_) {}
      }
      function normalize(s) {
        return {
          order:     Array.isArray(s.order)     ? s.order     : [],
          notes:     (s.notes     && typeof s.notes     === 'object') ? s.notes     : {},
          collapsed: (s.collapsed && typeof s.collapsed === 'object') ? s.collapsed : {},
        };
      }
      function seedDefault() {
        const now = new Date();
        const months = [];
        for (let i = 0; i < 3; i++) {
          months.push(ymKey(new Date(now.getFullYear(), now.getMonth() + i, 1)));
        }
        return { order: months, notes: {}, collapsed: {} };
      }
      function ymKey(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'); }
      function monthName(key) {
        const [y, m] = key.split('-').map(Number);
        return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long' });
      }
      function yearOf(key) { return key.split('-')[0]; }
      function nextAfter(key) {
        const [y, m] = key.split('-').map(Number);
        return ymKey(new Date(y, m, 1));
      }
      function escape(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function render() {
        wrap.innerHTML = state.order.map((key) => {
          const collapsed = !!state.collapsed[key];
          const noteHtml = state.notes[key] || '';
          return `
            <div class="mlc-month${collapsed ? ' is-collapsed' : ''}" data-key="${escape(key)}">
              <div class="mlc-month-head">
                <div class="mlc-month-title">
                  <span class="mlc-month-name">${escape(monthName(key))}</span>
                  <span class="mlc-month-year">${escape(yearOf(key))}</span>
                </div>
                <div class="mlc-month-actions">
                  <button type="button" class="mlc-month-x" aria-label="Remove ${escape(monthName(key))}">×</button>
                  <button type="button" class="mlc-month-toggle" aria-label="${collapsed ? 'Expand' : 'Collapse'}">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <polyline points="6 15 12 9 18 15"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="mlc-month-body" contenteditable="true"
                   data-placeholder="Notes, goals, planning for ${escape(monthName(key))}…">${noteHtml}</div>
            </div>
          `;
        }).join('') + `<button type="button" class="mlc-month-add">+ Add month</button>`;
        wire();
      }

      function wire() {
        wrap.querySelectorAll('.mlc-month').forEach((card) => {
          const key  = card.dataset.key;
          const body = card.querySelector('.mlc-month-body');

          body.addEventListener('input', () => {
            const stripped = body.innerHTML.replace(/<br\s*\/?>/gi, '').trim();
            if (!stripped) delete state.notes[key]; else state.notes[key] = body.innerHTML;
            save();
          });

          card.querySelector('.mlc-month-toggle').addEventListener('click', () => {
            state.collapsed[key] = !state.collapsed[key];
            save();
            card.classList.toggle('is-collapsed', state.collapsed[key]);
            card.querySelector('.mlc-month-toggle').setAttribute(
              'aria-label', state.collapsed[key] ? 'Expand' : 'Collapse'
            );
          });

          card.querySelector('.mlc-month-x').addEventListener('click', () => {
            if (!confirm(`Remove ${monthName(key)} ${yearOf(key)}?`)) return;
            state.order = state.order.filter((k) => k !== key);
            delete state.notes[key];
            delete state.collapsed[key];
            save();
            render();
          });
        });

        const addBtn = wrap.querySelector('.mlc-month-add');
        if (addBtn) {
          addBtn.addEventListener('click', () => {
            const last = state.order[state.order.length - 1];
            const next = last ? nextAfter(last) : ymKey(new Date());
            if (state.order.includes(next)) return;
            state.order.push(next);
            save();
            render();
          });
        }
      }

      render();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
</body>
</html>
