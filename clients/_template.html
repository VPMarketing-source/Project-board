<script>
  /* =====================================================================
     NEW CLIENT TEMPLATE — copy this file to "clients/<slug>.html" and:
       1. Change CLIENT_DATA.id to a unique short slug (lowercase, no spaces)
       2. Fill in name / initials / sub
       3. Set the funnel defaults (or leave the example values)
       4. Empty out — or populate — campaigns / notes / links
       5. Add a tile entry for this client in the home index.html

     The id MUST be unique per client. It scopes localStorage AND the
     Supabase planner_state.client_id column. Reusing an id will collide
     with that client's data.

     If you want a fully custom layout (not the shared dashboard.js
     render), skip dashboard.js entirely and build your own UI — just
     keep CLIENT_DATA + sync.js so cross-device sync still works.
     ===================================================================== */
  window.CLIENT_DATA = {
    id:       'new-client',          // ← CHANGE: unique slug, e.g. 'linen', 'mlc'
    name:     'New Client',          // ← CHANGE
    initials: 'NC',                  // ← CHANGE: 2 chars
    sub:      'Email marketing · Klaviyo',

    funnel: {
      spend: 4000,
      cpv:   0.68,
      cvr:   2.0,
      aov:   95,
      ret:   28,
      rov:   105,
    },

    campaigns: [
      // { name: 'Campaign name', date: 'Wed 28 May · 7:00am', status: 'draft', url: 'https://app.clickup.com/t/...' },
    ],
    retainer: [
      // { name: 'Task name', date: 'Mon 02 Jun', status: 'todo', url: 'https://app.clickup.com/t/...' },
      // status: 'todo' | 'doing' | 'review' | 'done' | 'blocked'
    ],
    tasks: [
      // ad-hoc tasks (Tasks tab) — same shape as retainer
    ],
    notes: [
      // { text: 'First note here', muted: false },
    ],
    links: [
      { label: 'Klaviyo account',         url: '' },
      { label: 'ClickUp — campaign list', url: '' },
      { label: 'Claude project',          url: '' },
      { label: 'Brand guidelines',        url: '' },
    ],
  };
</script>
