<body>

<script>
  /* =====================================================================
     Wire [data-persist-key] contenteditable elements (e.g. urgent notes)
     to localStorage under pc-ops::vpmarketing::<key>::v1, so edits survive
     reload AND auto-sync cross-device via shared/sync.js.
     ===================================================================== */
  (function bootPersistKeys() {
    function init() {
      const home = document.getElementById('panel-home');
      if (!home) { setTimeout(init, 50); return; }
      const els = home.querySelectorAll('[data-persist-key]');
      if (!els.length) return;
      els.forEach((el) => {
        if (el.dataset.pcPersistWired === '1') return;
        const key = `pc-ops::vpmarketing::${el.dataset.persistKey}::v1`;
        const saved = localStorage.getItem(key);
        if (saved != null) el.innerHTML = saved;
        el.addEventListener('input', () => {
          const stripped = el.innerHTML.replace(/<br\s*\/?>/gi, '').trim();
          if (!stripped) localStorage.removeItem(key);
          else localStorage.setItem(key, el.innerHTML);
        });
        el.dataset.pcPersistWired = '1';
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
