<!-- =====================================================================
     Supabase cross-device sync. This block runs BEFORE every other
     script on the page so localStorage writes are intercepted and
     mirrored to Supabase from the very first keystroke.

     To fork this planner for another client: COPY THIS FILE, then change
     ONLY the CLIENT_ID constant below. SUPABASE_URL and SUPABASE_KEY are
     shared across every planner — they all read/write to the same table
     scoped by client_id.
     ===================================================================== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (function bootPlannerSync() {
    const CLIENT_ID     = 'vpm';   // <-- change this when forking the file
    const SUPABASE_URL  = 'https://rqlrpxxkskqxpjgiqyql.supabase.co';
    const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxbHJweHhrc2txeHBqZ2lxeXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5Mjc3OTYsImV4cCI6MjA5NTUwMzc5Nn0.RG7fzJxp_SoSMNxHlkfLgrAx7ycupmt0jEDm3q9XHBE';
    const TABLE         = 'planner_state';
    const MIGRATED_KEY  = '__planner_supabase_migrated::' + CLIENT_ID;
    const DEBOUNCE_MS   = 300;
    const SYNC_KEY_RE   = /^(pc-ops::|__keep::)/; // only sync planner data

    // Expose so debugging tools / other scripts can probe state.
    window.__planner = { CLIENT_ID, status: 'init', pending: 0 };

    // ---- 1. Intercept localStorage.setItem to mirror to Supabase -------
    const origSetItem = Storage.prototype.setItem;
    const origRemoveItem = Storage.prototype.removeItem;
    const pendingUpserts = new Map();     // key → value string
    const recentlyWritten = new Map();    // key → timestamp (to ignore echo)
    let debounceTimer = null;

    Storage.prototype.setItem = function (key, value) {
      origSetItem.call(this, key, value);
      if (this === window.localStorage && typeof key === 'string' && SYNC_KEY_RE.test(key)) {
        queueUpsert(key, value);
      }
    };
    Storage.prototype.removeItem = function (key) {
      origRemoveItem.call(this, key);
      if (this === window.localStorage && typeof key === 'string' && SYNC_KEY_RE.test(key)) {
        queueUpsert(key, null);
      }
    };

    function queueUpsert(key, value) {
      pendingUpserts.set(key, value);
      window.__planner.pending = pendingUpserts.size;
      updateIndicator();
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = setTimeout(flushUpserts, DEBOUNCE_MS);
    }

    // ---- 2. Init Supabase client (poll until CDN script loads) ---------
    let client = null;
    let realtimeChannel = null;

    function waitForSupabase() {
      return new Promise((resolve) => {
        if (window.supabase && window.supabase.createClient) return resolve();
        const t = setInterval(() => {
          if (window.supabase && window.supabase.createClient) {
            clearInterval(t);
            resolve();
          }
        }, 30);
      });
    }

    // ---- 3. Push pending writes ----------------------------------------
    async function flushUpserts() {
      if (!client || pendingUpserts.size === 0) return;
      const rows = [];
      const deletes = [];
      pendingUpserts.forEach((val, key) => {
        if (val === null) deletes.push(key);
        else rows.push({ client_id: CLIENT_ID, key, value: { raw: val }, updated_at: new Date().toISOString() });
        recentlyWritten.set(key, Date.now());
      });
      pendingUpserts.clear();
      window.__planner.pending = 0;
      window.__planner.status = 'syncing';
      updateIndicator();
      try {
        if (rows.length) {
          const { error } = await client.from(TABLE).upsert(rows, { onConflict: 'client_id,key' });
          if (error) throw error;
        }
        if (deletes.length) {
          const { error } = await client.from(TABLE).delete().eq('client_id', CLIENT_ID).in('key', deletes);
          if (error) throw error;
        }
        window.__planner.status = 'synced';
        window.__planner.lastSynced = Date.now();
      } catch (e) {
        // Re-queue and retry later — never log the anon key
        rows.forEach((r) => pendingUpserts.set(r.key, r.value.raw));
        deletes.forEach((k) => pendingUpserts.set(k, null));
        window.__planner.pending = pendingUpserts.size;
        window.__planner.status = 'offline';
        // Retry in 5s
        setTimeout(flushUpserts, 5000);
      }
      updateIndicator();
    }

    // ---- 4. Seed from Supabase on page load ----------------------------
    async function seed() {
      if (!client) return;
      try {
        const { data, error } = await client
          .from(TABLE)
          .select('key,value,updated_at')
          .eq('client_id', CLIENT_ID);
        if (error) throw error;

        const before = snapshotLocal();
        const remoteKeys = new Set();
        let anyChanged = false;
        (data || []).forEach((row) => {
          remoteKeys.add(row.key);
          const remoteStr = (row.value && typeof row.value === 'object' && 'raw' in row.value)
            ? row.value.raw
            : (typeof row.value === 'string' ? row.value : JSON.stringify(row.value));
          if (remoteStr == null) return;
          const localStr = window.localStorage.getItem(row.key);
          if (localStr !== remoteStr) {
            anyChanged = true;
            origSetItem.call(window.localStorage, row.key, remoteStr);
            try {
              window.dispatchEvent(new StorageEvent('storage', { key: row.key, newValue: remoteStr, oldValue: localStr }));
            } catch (_) {}
          }
        });

        // Migration: first time on a device with existing local data, push
        // every local planner key that Supabase doesn't have yet.
        const migrated = window.localStorage.getItem(MIGRATED_KEY) === '1';
        if (!migrated) {
          for (let i = 0; i < window.localStorage.length; i++) {
            const k = window.localStorage.key(i);
            if (!k || !SYNC_KEY_RE.test(k)) continue;
            if (remoteKeys.has(k)) continue;
            const v = window.localStorage.getItem(k);
            if (v == null) continue;
            queueUpsert(k, v);
          }
          origSetItem.call(window.localStorage, MIGRATED_KEY, '1');
        }

        // If the page rendered from a totally empty localStorage and we
        // pulled in new data, reload so all widgets paint with the right
        // initial state. Only do this if the user hasn't started typing
        // anywhere yet (no active text-edit element).
        if (anyChanged && Object.keys(before).length === 0 &&
            !document.activeElement?.matches('input,textarea,[contenteditable="true"]')) {
          location.reload();
          return;
        }

        window.__planner.status = 'synced';
        updateIndicator();
      } catch (e) {
        window.__planner.status = 'offline';
        updateIndicator();
      }
    }

    function snapshotLocal() {
      const out = {};
      for (let i = 0; i < window.localStorage.length; i++) {
        const k = window.localStorage.key(i);
        if (k && SYNC_KEY_RE.test(k)) out[k] = window.localStorage.getItem(k);
      }
      return out;
    }

    // ---- 5. Realtime — apply remote changes to localStorage ------------
    function setupRealtime() {
      if (!client) return;
      realtimeChannel = client
        .channel('planner_state_' + CLIENT_ID)
        .on('postgres_changes',
            { event: '*', schema: 'public', table: TABLE, filter: 'client_id=eq.' + CLIENT_ID },
            (payload) => {
              const row = payload.new || payload.old;
              if (!row || !row.key) return;
              // Ignore echoes of our own recent writes (within 3s)
              const writtenAt = recentlyWritten.get(row.key);
              if (writtenAt && Date.now() - writtenAt < 3000) return;
              if (payload.eventType === 'DELETE') {
                if (window.localStorage.getItem(row.key) != null) {
                  origRemoveItem.call(window.localStorage, row.key);
                  try { window.dispatchEvent(new StorageEvent('storage', { key: row.key, newValue: null })); } catch (_) {}
                }
                return;
              }
              const v = payload.new && payload.new.value;
              const remoteStr = (v && typeof v === 'object' && 'raw' in v)
                ? v.raw
                : (typeof v === 'string' ? v : JSON.stringify(v));
              if (remoteStr == null) return;
              const localStr = window.localStorage.getItem(row.key);
              if (localStr !== remoteStr) {
                origSetItem.call(window.localStorage, row.key, remoteStr);
                try {
                  window.dispatchEvent(new StorageEvent('storage', { key: row.key, newValue: remoteStr, oldValue: localStr }));
                } catch (_) {}
              }
            })
        .subscribe();
    }

    // ---- 6. Tiny sync indicator in the header --------------------------
    function ensureIndicator() {
      let el = document.getElementById('planner-sync-indicator');
      if (el) return el;
      const header = document.querySelector('.header') || document.querySelector('header.header') || document.body;
      el = document.createElement('div');
      el.id = 'planner-sync-indicator';
      el.style.cssText = 'position:fixed;top:10px;right:14px;z-index:9999;font:500 11px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;letter-spacing:0.04em;color:#5a5f6e;background:rgba(255,255,255,0.85);backdrop-filter:saturate(140%) blur(6px);padding:5px 10px;border:1px solid rgba(17,19,26,0.08);border-radius:999px;pointer-events:none;transition:opacity 180ms ease,color 180ms ease;';
      document.body.appendChild(el);
      return el;
    }
    function updateIndicator() {
      if (document.readyState === 'loading') return;
      const el = ensureIndicator();
      const s = window.__planner.status;
      const p = window.__planner.pending;
      if (s === 'syncing' || p > 0) {
        el.textContent = 'Syncing' + (p > 0 ? ' · ' + p : '') + '…';
        el.style.color = '#2960ff';
        el.style.opacity = '1';
      } else if (s === 'offline') {
        el.textContent = 'Offline' + (p > 0 ? ' · ' + p + ' pending' : '');
        el.style.color = '#c0392b';
        el.style.opacity = '1';
      } else if (s === 'synced') {
        el.textContent = 'Synced ✓';
        el.style.color = '#16a34a';
        el.style.opacity = '1';
        // fade after a beat
        clearTimeout(el.__fade);
        el.__fade = setTimeout(() => { el.style.opacity = '0.4'; }, 1500);
      } else {
        el.textContent = 'Connecting…';
        el.style.color = '#6c6f7a';
        el.style.opacity = '1';
      }
    }
    document.addEventListener('DOMContentLoaded', updateIndicator);

    // ---- 7. Kick off ---------------------------------------------------
    (async () => {
      await waitForSupabase();
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { persistSession: false },
        realtime: { params: { eventsPerSecond: 10 } },
      });
      window.__planner.status = 'syncing';
      updateIndicator();
      await seed();
      setupRealtime();
      // Periodic safety flush in case a debounce was missed
      setInterval(flushUpserts, 5000);
    })();

    // Final flush on unload to catch any in-flight edits.
    window.addEventListener('beforeunload', () => {
      if (pendingUpserts.size > 0 && client) {
        // Best-effort: convert to sync upsert via sendBeacon-ish trick.
        // Supabase JS doesn't expose that, so just queue and hope flush
        // fires (300ms debounce + immediate beforeunload usually wins).
        flushUpserts();
      }
    });
  })();
</script>

<script>
  /* =====================================================================
     Floating text-formatting toolbar — appears when the user selects
     text inside any contenteditable element on the page (day cells,
     week notes, key dates, etc.). Bold, italic, underline, and a
     curated swatch of colors. Uses document.execCommand for simplicity;
     the contenteditable rich-text writes survive localStorage since we
     store innerHTML.
     ===================================================================== */
  (function initFormatToolbar() {
    const COLORS = ['#11131a', '#2960ff', '#ef4444', '#16a34a', '#a86b14', '#6c6f7a'];
    const bar = document.createElement('div');
    bar.className = 'fmt-toolbar';
    bar.innerHTML = `
      <button type="button" data-cmd="bold" title="Bold (Ctrl+B)"><span class="fmt-b">B</span></button>
      <button type="button" data-cmd="italic" title="Italic (Ctrl+I)"><span class="fmt-i">I</span></button>
      <button type="button" data-cmd="underline" title="Underline (Ctrl+U)"><span class="fmt-u">U</span></button>
      <button type="button" data-cmd="strikeThrough" title="Strikethrough"><span class="fmt-s">S</span></button>
      <span class="fmt-sep"></span>
      <button type="button" data-cmd="insertUnorderedList" title="Bullet list">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"></line><line x1="9" y1="12" x2="20" y2="12"></line><line x1="9" y1="18" x2="20" y2="18"></line><circle cx="4.5" cy="6" r="1.3" fill="currentColor" stroke="none"></circle><circle cx="4.5" cy="12" r="1.3" fill="currentColor" stroke="none"></circle><circle cx="4.5" cy="18" r="1.3" fill="currentColor" stroke="none"></circle></svg>
      </button>
      <span class="fmt-sep"></span>
      ${COLORS.map((c) => `<button type="button" class="fmt-swatch" data-color="${c}" style="background:${c}" title="Color: ${c}"></button>`).join('')}
    `;
    document.body.appendChild(bar);

    let savedRange = null;

    function inEditable() {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return null;
      const range = sel.getRangeAt(0);
      let node = range.commonAncestorContainer;
      if (node.nodeType === 3) node = node.parentElement;
      const ce = node.closest('[contenteditable="true"]');
      return ce ? range : null;
    }

    function positionBar(range) {
      const rect = range.getBoundingClientRect();
      if (!rect.width && !rect.height) return;
      bar.style.top  = (rect.top + window.scrollY - bar.offsetHeight - 8) + 'px';
      bar.style.left = (rect.left + window.scrollX + rect.width / 2 - bar.offsetWidth / 2) + 'px';
    }

    function updateBar() {
      const range = inEditable();
      if (!range) {
        bar.classList.remove('is-open');
        return;
      }
      savedRange = range.cloneRange();
      bar.classList.add('is-open');
      positionBar(range);
    }

    document.addEventListener('mouseup', () => setTimeout(updateBar, 0));
    document.addEventListener('keyup', updateBar);
    document.addEventListener('selectionchange', updateBar);

    bar.addEventListener('mousedown', (e) => {
      // Prevent the click from collapsing the selection before we act
      e.preventDefault();
    });
    bar.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      if (savedRange) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(savedRange);
      }
      if (btn.dataset.cmd) {
        document.execCommand(btn.dataset.cmd, false, null);
      } else if (btn.dataset.color) {
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, btn.dataset.color);
      }
      // Re-fire whatever input listener the surrounding editor wired up so the
      // change is persisted to localStorage.
      const ce = window.getSelection().anchorNode &&
                 (window.getSelection().anchorNode.nodeType === 3
                    ? window.getSelection().anchorNode.parentElement
                    : window.getSelection().anchorNode)
                  .closest('[contenteditable="true"]');
      if (ce) ce.dispatchEvent(new Event('input', { bubbles: true }));
    });
  })();
</script>
<script>
  /* =====================================================================
     Calendar bootstrap — runs after dashboard.js has rendered the Home
     panel, then appends the month calendar below the Notes box. All
     events persist to localStorage under pc-ops::vpm::calendar::v1.
     ===================================================================== */
  (function bootCalendar() {
    const STORE_KEY = 'pc-ops::vpm::calendar::v1';
    const KD_TITLE_KEY = 'pc-ops::vpm::keydates::title::v1';
    const KD_BODY_KEY  = 'pc-ops::vpm::keydates::body::v1';

    /* Safety net: walk every editable area on the page and flush its
       current content to localStorage. Runs on tab-switch, blur, and
       page-unload so nothing in-flight gets lost on the next render.
       (The normal input handler still does the per-keystroke save —
       this just guarantees the very last edit before navigation.) */
    function flushAllEditables() {
      try {
        // Day-column freeform text (both source week + pinned clone)
        const freeCur = JSON.parse(localStorage.getItem(STORE_KEY + '::freeform') || '{}');
        document.querySelectorAll('.cwg-col-free[data-key]').forEach((el) => {
          const key = el.dataset.key;
          const html = el.innerHTML;
          const stripped = html.replace(/<br\s*\/?>/gi, '').trim();
          if (!stripped) delete freeCur[key]; else freeCur[key] = html;
        });
        localStorage.setItem(STORE_KEY + '::freeform', JSON.stringify(freeCur));

        // Inline week notes
        const inlineCur = JSON.parse(localStorage.getItem(STORE_KEY + '::weekInline') || '{}');
        document.querySelectorAll('.cal-week-inline-note[data-week-key]').forEach((el) => {
          const wkKey = el.dataset.weekKey;
          const text = el.textContent.trim();
          if (!text) delete inlineCur[wkKey]; else inlineCur[wkKey] = text;
        });
        localStorage.setItem(STORE_KEY + '::weekInline', JSON.stringify(inlineCur));

        // Key dates body / title
        const kdBody = document.querySelector('.key-dates-body');
        if (kdBody) localStorage.setItem(KD_BODY_KEY, kdBody.innerHTML);
        const kdTitle = document.querySelector('.key-dates-title');
        if (kdTitle) localStorage.setItem(KD_TITLE_KEY, kdTitle.textContent.trim());
      } catch (e) { /* ignore — best-effort flush */ }
    }
    window.addEventListener('beforeunload', flushAllEditables);
    window.addEventListener('pagehide', flushAllEditables);
    window.addEventListener('blur', flushAllEditables);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') flushAllEditables();
    });

    function mountKeyDates() {
      const homePanel = document.getElementById('panel-home');
      if (!homePanel) return setTimeout(mountKeyDates, 50);
      if (document.getElementById('key-dates')) return;
      const aside = document.createElement('aside');
      aside.id = 'key-dates';
      aside.className = 'key-dates';
      aside.setAttribute('data-screen-label', 'Key dates');
      const titleText = localStorage.getItem(KD_TITLE_KEY) || '';
      aside.innerHTML = '<h2 class="key-dates-title" contenteditable="true">' + titleText + '</h2><div class="key-dates-body" contenteditable="true"></div>';
      const body  = aside.querySelector('.key-dates-body');
      const title = aside.querySelector('.key-dates-title');
      body.innerHTML = localStorage.getItem(KD_BODY_KEY) || '';
      title.addEventListener('input', () => {
        localStorage.setItem(KD_TITLE_KEY, title.textContent.trim());
      });
      body.addEventListener('input', () => {
        localStorage.setItem(KD_BODY_KEY, body.innerHTML);
      });
      homePanel.appendChild(aside);
    }
    mountKeyDates();
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    // Week starts Monday — 0=Mon … 6=Sun
    const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    // Convert JS getDay() (0=Sun..6=Sat) into our Monday-first index (0=Mon..6=Sun)
    const dowMon = (d) => (d.getDay() + 6) % 7;

    function loadEvents() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
      catch (e) { return {}; }
    }
    function saveEvents(data) {
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }
    function ymd(d) {
      return d.getFullYear() + '-' +
             String(d.getMonth() + 1).padStart(2, '0') + '-' +
             String(d.getDate()).padStart(2, '0');
    }
    function fmtLong(key) {
      const [y, m, d] = key.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      return DOW[dowMon(dt)] + ', ' + MONTH_NAMES[m - 1] + ' ' + d + ', ' + y;
    }

    const state = {
      view: new Date(),
      events: loadEvents(),
      openDay: null,
      mode: localStorage.getItem(STORE_KEY + '::mode') || 'month',
      collapsed: localStorage.getItem(STORE_KEY + '::collapsed') === '1',
    };
    // For month mode we snap view to the 1st; for week mode we keep the
    // exact date and resolve the Monday of that week at render time.
    if (state.mode === 'month') state.view.setDate(1);

    function setMode(m) {
      state.mode = m;
      localStorage.setItem(STORE_KEY + '::mode', m);
      // Re-anchor view sensibly when switching
      if (m === 'month') state.view.setDate(1);
      buildShell(true);
      attachHandlers();
      render();
    }
    function mondayOf(d) {
      const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      x.setDate(x.getDate() - dowMon(x));
      return x;
    }

    // Ensures the "Calendar" tab + #panel-calendar exist. Returns the panel.
    function ensureCalendarTab() {
      let panel = document.getElementById('panel-calendar');
      if (panel) return panel;
      const tabs = document.getElementById('tabs');
      const page = document.querySelector('main.page');
      if (!tabs || !page) return document.getElementById('panel-home');
      panel = document.createElement('section');
      panel.className = 'panel';
      panel.id = 'panel-calendar';
      panel.setAttribute('role', 'tabpanel');
      panel.setAttribute('data-screen-label', 'Calendar');
      page.appendChild(panel);
      if (!tabs.querySelector('[data-tab="calendar"]')) {
        const btn = document.createElement('button');
        btn.className = 'tab';
        btn.type = 'button';
        btn.dataset.tab = 'calendar';
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', 'false');
        btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="17" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="16" y1="2" x2="16" y2="6"></line></svg> Calendar';
        const homeBtn = tabs.querySelector('[data-tab="home"]');
        const addBtn  = tabs.querySelector('.tab-add');
        if (homeBtn && homeBtn.nextSibling) tabs.insertBefore(btn, homeBtn.nextSibling);
        else if (addBtn) tabs.insertBefore(btn, addBtn);
        else tabs.appendChild(btn);
      }
      return panel;
    }

    function buildShell(force) {
      const homePanel = document.getElementById('panel-home');
      if (!homePanel) return null;
      let cal = document.getElementById('planner-cal');
      if (cal && force) cal.remove();
      cal = document.getElementById('planner-cal');

      // "Current week" pinned section above the Calendar accordion.
      let pinned = document.getElementById('current-week-pinned');
      if (!pinned) {
        pinned = document.createElement('section');
        pinned.id = 'current-week-pinned';
        pinned.className = 'current-week-pinned';
        pinned.setAttribute('data-screen-label', 'This week');
        pinned.innerHTML = `
          <header class="cwp-head">
            <span class="cwp-kicker">This week</span>
          </header>
          <div class="cwp-body"></div>
        `;
      }
      // Force-position above the Calendar accordion, regardless of when it
      // was originally appended. If planner-cal already exists, slot the
      // pinned section in immediately before it; else put it after the
      // Notes box (or at the very top if Notes hasn't rendered yet).
      // Always pin to the very top of the home panel — above the Notes
      // box and above the Calendar accordion.
      if (homePanel.firstChild !== pinned) {
        homePanel.insertBefore(pinned, homePanel.firstChild);
      }

      if (cal) return cal;

      cal = document.createElement('section');
      cal.id = 'planner-cal';
      cal.className = 'planner-cal mode-' + state.mode;
      cal.setAttribute('data-screen-label', state.mode === 'week' ? 'Week planner' : 'Month calendar');
      cal.innerHTML = `
        <div class="cal-head">
          <button type="button" class="cal-wrap-head" id="cal-wrap-head" aria-expanded="true">
            <span class="cal-wrap-chev" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
            </span>
            <h2 class="cal-wrap-title">Calendar</h2>
          </button>
          <div class="cal-nav">
            <button type="button" id="cal-prev" title="Previous month">‹</button>
            <button type="button" class="cal-today" id="cal-today">Today</button>
            <button type="button" id="cal-next" title="Next month">›</button>
          </div>
        </div>
        <div class="cal-months" id="cal-months"></div>
      `;
      // Mount the calendar into its own tab panel (#panel-calendar), which
      // we lazy-create with a sibling Calendar tab if it doesn't exist yet.
      const calPanel = ensureCalendarTab();
      calPanel.appendChild(cal);
      if (state.collapsed) cal.classList.add('is-collapsed');

      // Modal (appended to body so it overlays everything)
      let modal = document.getElementById('cal-modal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'cal-modal';
        modal.className = 'cal-modal';
        modal.innerHTML = `
          <div class="cal-modal-card">
            <div class="cal-modal-head">
              <h3 class="cal-modal-date" id="cal-modal-date">—</h3>
              <button type="button" class="cal-modal-close" id="cal-modal-close" aria-label="Close">×</button>
            </div>
            <div class="cal-event-list" id="cal-event-list"></div>
            <div class="cal-modal-actions">
              <button type="button" class="cal-btn" id="cal-add">+ Add event</button>
              <button type="button" class="cal-btn primary" id="cal-save">Done</button>
            </div>
          </div>
        `;
        document.body.appendChild(modal);
      }
      return cal;
    }

    function render() {
      renderMonth();
      renderCurrentWeekPinned();
    }

    // Render a copy of the current week's row (Mon–Sun grid + inline note +
    // 7 day columns) inside #current-week-pinned, kept in sync with whatever
    // the source week shows in the Calendar accordion.
    function renderCurrentWeekPinned() {
      const pinned = document.getElementById('current-week-pinned');
      if (!pinned) return;
      const body = pinned.querySelector('.cwp-body');
      body.innerHTML = '';
      // The Calendar accordion may not have rendered yet; defer one frame.
      requestAnimationFrame(() => {
        const src = document.querySelector('.cal-week.has-today');
        if (!src) return;
        const clone = src.cloneNode(true);
        clone.classList.add('is-open', 'is-pinned-clone');
        // Strip ids inside the clone so they don't collide.
        clone.querySelectorAll('[id]').forEach((n) => n.removeAttribute('id'));
        body.appendChild(clone);

        // cloneNode() doesn't copy event listeners, so the editable day
        // columns + inline week note in the clone would accept typing but
        // never persist — which is how content "randomly goes missing"
        // on the next re-render. Re-wire input handlers + reseed content
        // from localStorage so the pinned section is fully live.
        const FREE = JSON.parse(localStorage.getItem(STORE_KEY + '::freeform') || '{}');
        clone.querySelectorAll('.cwg-col-free[data-key]').forEach((free) => {
          const key = free.dataset.key;
          // Reseed in case the source DOM was stale.
          free.innerHTML = FREE[key] || '';
          free.addEventListener('input', () => {
            const cur = JSON.parse(localStorage.getItem(STORE_KEY + '::freeform') || '{}');
            const html = free.innerHTML;
            const stripped = html.replace(/<br\s*\/?>/gi, '').trim();
            if (!stripped) delete cur[key]; else cur[key] = html;
            localStorage.setItem(STORE_KEY + '::freeform', JSON.stringify(cur));
            // Mirror into the source DOM so a later re-clone shows the
            // latest content even before a full re-render.
            const srcCell = src.querySelector('.cwg-col-free[data-key="' + key + '"]');
            if (srcCell && srcCell !== free) srcCell.innerHTML = html;
          });
        });
        const inlineAll = JSON.parse(localStorage.getItem(STORE_KEY + '::weekInline') || '{}');
        clone.querySelectorAll('.cal-week-inline-note[data-week-key]').forEach((note) => {
          const wkKey = note.dataset.weekKey;
          note.textContent = inlineAll[wkKey] || '';
          note.addEventListener('click', (e) => e.stopPropagation());
          note.addEventListener('input', () => {
            const cur = JSON.parse(localStorage.getItem(STORE_KEY + '::weekInline') || '{}');
            const text = note.textContent.trim();
            if (!text) delete cur[wkKey]; else cur[wkKey] = text;
            localStorage.setItem(STORE_KEY + '::weekInline', JSON.stringify(cur));
            const srcNote = src.querySelector('.cal-week-inline-note[data-week-key="' + wkKey + '"]');
            if (srcNote && srcNote !== note) srcNote.textContent = note.textContent;
          });
        });
      });
    }

    function renderWeek() {
      const monthEl = document.getElementById('cal-month');
      const yearEl  = document.getElementById('cal-year');
      const grid    = document.getElementById('cal-week-grid');
      if (!grid) return;
      const anchor = mondayOf(state.view);
      const days = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(anchor.getFullYear(), anchor.getMonth(), anchor.getDate() + i);
        days.push(d);
      }
      const first = days[0], last = days[6];
      if (first.getMonth() === last.getMonth()) {
        monthEl.textContent = MONTH_NAMES[first.getMonth()];
      } else {
        monthEl.textContent = MONTH_NAMES[first.getMonth()].slice(0,3) + ' – ' + MONTH_NAMES[last.getMonth()].slice(0,3);
      }
      yearEl.textContent = first.getFullYear();

      const todayKey = ymd(new Date());
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = 'repeat(7, 1fr)';

      // 7 day columns: header + open event-stack body. No hour rows.
      const FREE = JSON.parse(localStorage.getItem(STORE_KEY + '::freeform') || '{}');
      days.forEach((d) => {
        const key = ymd(d);
        const isToday = key === todayKey;
        const col = document.createElement('div');
        col.className = 'cwg-col' + (isToday ? ' is-today' : '');
        col.innerHTML = `
          <div class="cwg-col-head">
            <span class="cwg-dow">${DOW[dowMon(d)]}</span>
            <span class="cwg-num">${d.getDate()}</span>
          </div>
          <div class="cwg-col-chips"></div>
          <div class="cwg-col-free" contenteditable="true" data-key="${key}" data-placeholder="Type notes for the day…"></div>
        `;
        const chips = col.querySelector('.cwg-col-chips');
        const free  = col.querySelector('.cwg-col-free');
        free.innerHTML = FREE[key] || '';
        free.addEventListener('input', () => {
          const cur = JSON.parse(localStorage.getItem(STORE_KEY + '::freeform') || '{}');
          const html = free.innerHTML;
          // Strip empty <br>-only content so placeholder shows again.
          const stripped = html.replace(/<br\s*\/?>/gi, '').trim();
          if (!stripped) delete cur[key]; else cur[key] = html;
          localStorage.setItem(STORE_KEY + '::freeform', JSON.stringify(cur));
        });
        const events = (state.events[key] || []).slice().sort((a, b) => {
          const at = a.start || 'zz';
          const bt = b.start || 'zz';
          return at.localeCompare(bt);
        });
        events.forEach((ev) => {
          const chip = document.createElement('div');
          chip.className = 'cwg-chip is-' + (ev.kind || 'task');
          const time = ev.start ? `<span class="cwg-chip-time">${formatTime(ev.start)}</span> ` : '';
          chip.innerHTML = time + escapeHtml(ev.text || 'Untitled');
          chip.addEventListener('click', (e) => { e.stopPropagation(); openDay(key); });
          chips.appendChild(chip);
        });
        // Double-click anywhere in the column header to add a structured event
        col.querySelector('.cwg-col-head').addEventListener('dblclick', () => {
          if (!state.events[key]) state.events[key] = [];
          state.events[key].push({ kind: 'task', text: '' });
          saveEvents(state.events);
          openDay(key);
        });
        grid.appendChild(col);
      });
    }
    function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function formatHour(h) {
      const ap = h < 12 ? 'am' : 'pm';
      const hh = ((h + 11) % 12) + 1;
      return hh + ' ' + ap;
    }
    function formatTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const ap = h < 12 ? 'am' : 'pm';
      const hh = ((h + 11) % 12) + 1;
      return hh + (m ? ':' + String(m).padStart(2, '0') : '') + ap;
    }

    function renderMonth() {
      const monthsEl = document.getElementById('cal-months');
      if (!monthsEl) return;
      const view = state.view;

      monthsEl.innerHTML = '';
      const MONTH_COUNT = 3;
      const monthsOpen = JSON.parse(localStorage.getItem(STORE_KEY + '::monthsOpen') || '{}');
      for (let i = 0; i < MONTH_COUNT; i++) {
        const m = new Date(view.getFullYear(), view.getMonth() + i, 1);
        const monthKey = m.getFullYear() + '-' + (m.getMonth() + 1);
        const defaultOpen = i === 0;
        const isOpen = true; // months are always expanded — no accordion collapse

        const section = document.createElement('section');
        section.className = 'cal-month' + (isOpen ? ' is-open' : '');
        section.dataset.monthKey = monthKey;
        section.innerHTML = `
          <div class="cal-month-head" aria-expanded="true">
            <span class="cal-month-name">${MONTH_NAMES[m.getMonth()]}</span>
            <span class="cal-month-year">${m.getFullYear()}</span>
          </div>
          <div class="cal-month-body">
            <div class="cal-weeks"></div>
          </div>
        `;
        const weeksEl = section.querySelector('.cal-weeks');
        renderMonthWeeks(m, weeksEl);
        monthsEl.appendChild(section);
      }
    }

    function renderMonthWeeks(view, weeksEl) {
      const today = new Date();
      const todayKey = ymd(today);
      const firstOfMonth = new Date(view.getFullYear(), view.getMonth(), 1);
      const firstDow = dowMon(firstOfMonth);
      const daysInMonth = new Date(view.getFullYear(), view.getMonth() + 1, 0).getDate();
      const prevDays    = new Date(view.getFullYear(), view.getMonth(), 0).getDate();
      const totalCells = firstDow + daysInMonth;
      const weekCount  = Math.ceil(totalCells / 7);
      const openState  = JSON.parse(localStorage.getItem(STORE_KEY + '::open') || '{}');
      const monthOpenKey = view.getFullYear() + '-' + (view.getMonth() + 1);
      const monthOpens   = openState[monthOpenKey] || null;

      weeksEl.innerHTML = '';

      for (let w = 0; w < weekCount; w++) {
        // Compute the 7 dates of this week.
        const days = [];
        let weekHasToday = false;
        for (let i = 0; i < 7; i++) {
          const cellIdx = w * 7 + i - firstDow + 1;
          let dt, outside = false;
          if (cellIdx < 1) {
            dt = new Date(view.getFullYear(), view.getMonth() - 1, prevDays + cellIdx);
            outside = true;
          } else if (cellIdx > daysInMonth) {
            dt = new Date(view.getFullYear(), view.getMonth() + 1, cellIdx - daysInMonth);
            outside = true;
          } else {
            dt = new Date(view.getFullYear(), view.getMonth(), cellIdx);
          }
          const key = ymd(dt);
          if (key === todayKey) weekHasToday = true;
          days.push({ dt, outside, key, events: state.events[key] || [] });
        }

        // Decide default open: monthOpens overrides; else open any week with
        // events, the week containing today, or week 1 as a last resort.
        let isOpen;
        if (monthOpens) {
          isOpen = !!monthOpens[w];
        } else {
          const hasEvents = days.some((d) => d.events.length);
          isOpen = hasEvents || weekHasToday || (w === 0 && !todayInMonth(view, todayKey));
        }

        const eventCount = days.reduce((n, d) => n + d.events.length, 0);
        const firstDay = days[0].dt;
        const lastDay  = days[6].dt;
        const rangeLabel = firstDay.getDate() + ' ' + MONTH_NAMES[firstDay.getMonth()].slice(0,3) +
                           ' – ' + lastDay.getDate() + ' ' + MONTH_NAMES[lastDay.getMonth()].slice(0,3);

        const wkSection = document.createElement('section');
        wkSection.className = 'cal-week' + (isOpen ? ' is-open' : '') + (weekHasToday ? ' has-today' : '');
        wkSection.dataset.weekIdx = w;
        wkSection.innerHTML = `
          <div type="button" class="cal-week-head" aria-expanded="${isOpen}">
            <span class="cal-week-label">Week ${w + 1}</span>
            <span class="cal-week-range">${rangeLabel}</span>
            <span class="cal-week-inline-note" contenteditable="true" data-week-key="${view.getFullYear()}-${view.getMonth() + 1}-w${w}" spellcheck="true"></span>
            <button type="button" class="cal-week-note-btn" data-week-key="${view.getFullYear()}-${view.getMonth() + 1}-w${w}" aria-label="Week note" title="Week note">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11l3 3v13H5z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="14" y2="14"/></svg>
              <span class="cwnb-preview"></span>
            </button>
            ${eventCount ? `<span class="cal-week-count">${eventCount} event${eventCount === 1 ? '' : 's'}</span>` : ''}
            <button type="button" class="cal-week-chev" aria-label="Toggle week">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
          </div>
          <div class="cal-week-body">
            <div class="cal-grid"></div>
          </div>
        `;
        const grid = wkSection.querySelector('.cal-grid');
        grid.classList.add('cal-grid-week'); // signal: render as open columns
        const FREE = JSON.parse(localStorage.getItem(STORE_KEY + '::freeform') || '{}');
        days.forEach((d) => {
          const col = document.createElement('div');
          col.className = 'cwg-col' + (d.key === todayKey ? ' is-today' : '');
          col.dataset.key = d.key;
          col.innerHTML = `
            <div class="cwg-col-head">
              <span class="cwg-dow">${DOW[dowMon(d.dt)]}</span>
              <span class="cwg-num">${d.dt.getDate()}</span>
            </div>
            <div class="cwg-col-free" contenteditable="true" data-key="${d.key}" data-placeholder="Type notes for the day…"></div>
          `;
          const free = col.querySelector('.cwg-col-free');
          free.innerHTML = FREE[d.key] || '';
          free.addEventListener('input', () => {
            const cur = JSON.parse(localStorage.getItem(STORE_KEY + '::freeform') || '{}');
            const html = free.innerHTML;
            const stripped = html.replace(/<br\s*\/?>/gi, '').trim();
            if (!stripped) delete cur[d.key]; else cur[d.key] = html;
            localStorage.setItem(STORE_KEY + '::freeform', JSON.stringify(cur));
          });
          // Stop clicks on the column from bubbling up to the week-head toggle
          col.addEventListener('click', (e) => e.stopPropagation());
          // Double-click the day number to open the structured event modal
          col.querySelector('.cwg-col-head').addEventListener('dblclick', (e) => {
            e.stopPropagation();
            openDay(d.key);
          });
          grid.appendChild(col);
        });
        // Wire up the week-note popup trigger
        const NOTES = JSON.parse(localStorage.getItem(STORE_KEY + '::weekNotes') || '{}');
        const noteBtn = wkSection.querySelector('.cal-week-note-btn');
        const weekKey = noteBtn.dataset.weekKey;
        const preview = noteBtn.querySelector('.cwnb-preview');
        const refreshPreview = () => {
          const raw = (NOTES[weekKey] || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
          preview.textContent = raw ? raw.slice(0, 40) + (raw.length > 40 ? '…' : '') : '';
          noteBtn.classList.toggle('has-note', !!raw);
        };
        refreshPreview();
        noteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          openWeekNotePopup(weekKey, noteBtn, refreshPreview);
        });

        // Toggle open/close — only the chevron and label area collapse the row
        const head = wkSection.querySelector('.cal-week-head');
        const toggle = () => {
          wkSection.classList.toggle('is-open');
          const nowOpen = wkSection.classList.contains('is-open');
          head.setAttribute('aria-expanded', nowOpen);
          const cur = JSON.parse(localStorage.getItem(STORE_KEY + '::open') || '{}');
          if (!cur[monthOpenKey]) cur[monthOpenKey] = {};
          cur[monthOpenKey][w] = nowOpen;
          localStorage.setItem(STORE_KEY + '::open', JSON.stringify(cur));
        };
        wkSection.querySelector('.cal-week-chev').addEventListener('click', toggle);
        wkSection.querySelector('.cal-week-label').addEventListener('click', toggle);
        wkSection.querySelector('.cal-week-range').addEventListener('click', toggle);

        // Inline week-note editor (in the row), persists to its OWN store
        // (separate from the popup note so the two are independent).
        const inlineNote = wkSection.querySelector('.cal-week-inline-note');
        const inlineKey = inlineNote.dataset.weekKey;
        const inlineAll = JSON.parse(localStorage.getItem(STORE_KEY + '::weekInline') || '{}');
        if (inlineAll[inlineKey]) inlineNote.textContent = inlineAll[inlineKey];
        inlineNote.addEventListener('click', (e) => e.stopPropagation());
        inlineNote.addEventListener('input', () => {
          const cur = JSON.parse(localStorage.getItem(STORE_KEY + '::weekInline') || '{}');
          const text = inlineNote.textContent.trim();
          if (!text) delete cur[inlineKey]; else cur[inlineKey] = text;
          localStorage.setItem(STORE_KEY + '::weekInline', JSON.stringify(cur));
        });
        weeksEl.appendChild(wkSection);
      }
    }

    function todayInMonth(viewDate, todayKey) {
      const [y, m] = todayKey.split('-').map(Number);
      return y === viewDate.getFullYear() && (m - 1) === viewDate.getMonth();
    }

    // ── Week-note popup (one shared element, retargeted per click) ──
    let weekNotePop = null;
    function buildWeekNotePop() {
      weekNotePop = document.createElement('div');
      weekNotePop.className = 'cwn-pop';
      weekNotePop.innerHTML = `
        <div class="cwn-pop-head">
          <span class="cwn-pop-title">Week note</span>
          <button type="button" class="cwn-pop-close" aria-label="Close">×</button>
        </div>
        <textarea class="cwn-pop-body"></textarea>
      `;
      document.body.appendChild(weekNotePop);
      weekNotePop.querySelector('.cwn-pop-close').addEventListener('click', closeWeekNotePopup);
    }
    function openWeekNotePopup(weekKey, anchorBtn, onChange) {
      if (!weekNotePop) buildWeekNotePop();
      const NOTES = JSON.parse(localStorage.getItem(STORE_KEY + '::weekNotes') || '{}');
      const textarea = weekNotePop.querySelector('.cwn-pop-body');
      // Strip HTML for textarea
      const raw = (NOTES[weekKey] || '').replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]*>/g, '');
      textarea.value = raw;
      // Position below the button, clamped within the viewport
      const r = anchorBtn.getBoundingClientRect();
      const POP_W = 340;
      const MARGIN = 12;
      const maxLeft = window.innerWidth - POP_W - MARGIN;
      let left = r.left + window.scrollX;
      // Prefer right-aligning the popup with the button if the button is on the right
      if (r.left + POP_W > window.innerWidth - MARGIN) {
        left = r.right - POP_W + window.scrollX;
      }
      left = Math.min(Math.max(MARGIN + window.scrollX, left), maxLeft + window.scrollX);
      weekNotePop.style.top  = (r.bottom + window.scrollY + 6) + 'px';
      weekNotePop.style.left = left + 'px';
      weekNotePop.classList.add('is-open');
      setTimeout(() => textarea.focus(), 0);

      const handler = () => {
        const cur = JSON.parse(localStorage.getItem(STORE_KEY + '::weekNotes') || '{}');
        const v = textarea.value.trim();
        if (!v) delete cur[weekKey]; else cur[weekKey] = textarea.value.replace(/\n/g, '<br>');
        localStorage.setItem(STORE_KEY + '::weekNotes', JSON.stringify(cur));
        NOTES[weekKey] = cur[weekKey] || '';
        if (onChange) onChange();
      };
      textarea.oninput = handler;

      const outside = (e) => {
        if (weekNotePop.contains(e.target)) return;
        if (anchorBtn.contains(e.target)) return;
        closeWeekNotePopup();
      };
      setTimeout(() => document.addEventListener('click', outside, true), 0);
      weekNotePop._outside = outside;
    }
    function closeWeekNotePopup() {
      if (!weekNotePop) return;
      weekNotePop.classList.remove('is-open');
      if (weekNotePop._outside) {
        document.removeEventListener('click', weekNotePop._outside, true);
        weekNotePop._outside = null;
      }
    }

    function openDay(key) {
      state.openDay = key;
      const modal = document.getElementById('cal-modal');
      const dateEl = document.getElementById('cal-modal-date');
      const list = document.getElementById('cal-event-list');
      if (!modal) return;
      dateEl.textContent = fmtLong(key);
      renderEventList(list, key);
      modal.classList.add('is-open');
    }
    function closeDay() {
      const modal = document.getElementById('cal-modal');
      if (modal) modal.classList.remove('is-open');
      state.openDay = null;
      render();
    }
    function renderEventList(list, key) {
      list.innerHTML = '';
      const events = state.events[key] || [];
      events.forEach((ev, idx) => {
        const row = document.createElement('div');
        row.className = 'cal-event-row';
        row.innerHTML = `
          <select data-idx="${idx}" class="ev-kind">
            <option value="task">Task</option>
            <option value="busy">Meeting</option>
            <option value="note">Note</option>
          </select>
          <input data-idx="${idx}" class="ev-text" type="text" value="${(ev.text || '').replace(/"/g, '&quot;')}" placeholder="What's happening?" />
          <input data-idx="${idx}" class="ev-start" type="time" value="${ev.start || ''}" title="Start time" />
          <input data-idx="${idx}" class="ev-end"   type="time" value="${ev.end   || ''}" title="End time" />
          <button data-idx="${idx}" class="ev-del" type="button" title="Delete">×</button>
        `;
        row.querySelector('.ev-kind').value = ev.kind || 'task';
        list.appendChild(row);
      });

      list.querySelectorAll('.ev-text').forEach((inp) => {
        inp.addEventListener('input', (e) => {
          const idx = +e.target.dataset.idx;
          state.events[key][idx].text = e.target.value;
          saveEvents(state.events);
        });
      });
      list.querySelectorAll('.ev-kind').forEach((sel) => {
        sel.addEventListener('change', (e) => {
          const idx = +e.target.dataset.idx;
          state.events[key][idx].kind = e.target.value;
          saveEvents(state.events);
        });
      });
      list.querySelectorAll('.ev-start').forEach((inp) => {
        inp.addEventListener('change', (e) => {
          const idx = +e.target.dataset.idx;
          state.events[key][idx].start = e.target.value || undefined;
          saveEvents(state.events);
        });
      });
      list.querySelectorAll('.ev-end').forEach((inp) => {
        inp.addEventListener('change', (e) => {
          const idx = +e.target.dataset.idx;
          state.events[key][idx].end = e.target.value || undefined;
          saveEvents(state.events);
        });
      });
      list.querySelectorAll('.ev-del').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          const idx = +e.target.dataset.idx;
          state.events[key].splice(idx, 1);
          if (!state.events[key].length) delete state.events[key];
          saveEvents(state.events);
          renderEventList(list, key);
        });
      });
    }

    function attachHandlers() {
      const wrapHead = document.getElementById('cal-wrap-head');
      if (wrapHead) {
        wrapHead.addEventListener('click', () => {
          state.collapsed = !state.collapsed;
          localStorage.setItem(STORE_KEY + '::collapsed', state.collapsed ? '1' : '0');
          document.getElementById('planner-cal').classList.toggle('is-collapsed', state.collapsed);
          wrapHead.setAttribute('aria-expanded', !state.collapsed);
        });
        wrapHead.setAttribute('aria-expanded', !state.collapsed);
      }
      document.getElementById('cal-prev').addEventListener('click', () => {
        state.view.setMonth(state.view.getMonth() - 1);
        render();
      });
      document.getElementById('cal-next').addEventListener('click', () => {
        state.view.setMonth(state.view.getMonth() + 1);
        render();
      });
      document.getElementById('cal-today').addEventListener('click', () => {
        const t = new Date(); t.setDate(1);
        state.view = t;
        render();
      });
      document.getElementById('cal-modal-close').addEventListener('click', closeDay);
      document.getElementById('cal-save').addEventListener('click', closeDay);
      document.getElementById('cal-modal').addEventListener('click', (e) => {
        if (e.target.id === 'cal-modal') closeDay();
      });
      document.getElementById('cal-add').addEventListener('click', () => {
        const key = state.openDay;
        if (!key) return;
        if (!state.events[key]) state.events[key] = [];
        state.events[key].push({ kind: 'task', text: '' });
        saveEvents(state.events);
        renderEventList(document.getElementById('cal-event-list'), key);
        // Focus the new input
        const inputs = document.querySelectorAll('#cal-event-list .ev-text');
        if (inputs.length) inputs[inputs.length - 1].focus();
      });
    }

    function init(attempt) {
      const homePanel = document.getElementById('panel-home');
      if (!homePanel) {
        if (attempt > 20) return;
        return setTimeout(() => init((attempt || 0) + 1), 50);
      }
      buildShell();
      attachHandlers();
      render();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => init(0));
    } else {
      init(0);
    }
  })();
</script>

<script>
  /* =====================================================================
     ClickUp view tabs — Overdue + This Week. Each tab pulls tasks from a
     saved ClickUp view using the v2 Views API. Per-tab view IDs and the
     shared API token are stored in localStorage so the user can edit
     them inside the planner without touching the file.
     ===================================================================== */
  (function bootClickUpTabs() {
    const TOKEN_KEY = 'pc-ops::vpm::clickup::token::v1';
    const DEFAULT_TOKEN = 'pk_48819155_QXJJHTY8LGM2V3WIW77D8IBW04JDQLVY';

    function getToken() {
      return localStorage.getItem(TOKEN_KEY) || DEFAULT_TOKEN;
    }
    function setToken(t) {
      if (t && t !== DEFAULT_TOKEN) localStorage.setItem(TOKEN_KEY, t);
      else localStorage.removeItem(TOKEN_KEY);
    }

    function extractViewId(input) {
      if (!input) return input;
      const v = String(input).trim();
      let m = v.match(/\/v\/[a-z]{1,3}\/([a-z0-9-]+)/i);
      if (m) return m[1];
      m = v.match(/\/l\/h\/([a-z0-9-]+)/i);
      if (m) return m[1];
      return v;
    }
    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function fmtDate(ts) {
      if (!ts) return '';
      const d = new Date(+ts);
      const today = new Date(); today.setHours(0,0,0,0);
      const day = new Date(d); day.setHours(0,0,0,0);
      const diff = Math.round((today - day) / 86400000);
      const base = `${d.getDate()}/${d.getMonth() + 1}/${String(d.getFullYear()).slice(2)}`;
      if (diff > 0) return `${base} · ${diff}d late`;
      if (diff === 0) return `${base} · today`;
      return `${base} · in ${-diff}d`;
    }
    function getCustomField(task, name) {
      if (!task.custom_fields) return '';
      const f = task.custom_fields.find((x) => (x.name || '').toLowerCase().includes(name.toLowerCase()));
      if (!f) return '';
      if (f.type === 'drop_down' && f.value != null && f.type_config && f.type_config.options) {
        const opt = f.type_config.options[+f.value];
        return opt ? { label: opt.name, color: opt.color || '#6c6f7a' } : '';
      }
      if (typeof f.value === 'string') return { label: f.value, color: '#6c6f7a' };
      return '';
    }

    /* ----------------------------------------------------------------
       Mount a single ClickUp-backed tab. Config:
         key            short slug used in tab id, panel id, store key
         label          tab + heading text
         icon           inline SVG markup
         defaultView    fallback view ID
         emptyText      what to show when zero tasks
       ----------------------------------------------------------------*/
    function mountTab(cfg) {
      const VIEW_KEY = `pc-ops::vpm::clickup::${cfg.key}::viewId::v1`;
      function getViewId() {
        return localStorage.getItem(VIEW_KEY) || cfg.defaultView;
      }
      const q  = (role) => document.querySelector(`#panel-${cfg.key} [data-role="${role}"]`);
      const qa = (act)  => document.querySelector(`#panel-${cfg.key} [data-act="${act}"]`);

      function init() {
        const tabs = document.getElementById('tabs');
        const page = document.querySelector('main.page');
        if (!tabs || !page) return setTimeout(init, 80);
        injectTab(tabs);
        injectPanel(page);
        wireUp();
        if (location.hash === '#' + cfg.key) loadTasks();
      }
      init();

      function injectTab(tabs) {
        if (tabs.querySelector(`[data-tab="${cfg.key}"]`)) return;
        const btn = document.createElement('button');
        btn.className = 'tab';
        btn.type = 'button';
        btn.dataset.tab = cfg.key;
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', 'false');
        btn.innerHTML = `${cfg.icon} ${cfg.label}`;
        const addBtn = tabs.querySelector('.tab-add');
        if (addBtn) tabs.insertBefore(btn, addBtn);
        else tabs.appendChild(btn);
        btn.addEventListener('click', () => { setTimeout(loadTasks, 30); });
      }

      function injectPanel(page) {
        const panelId = 'panel-' + cfg.key;
        if (document.getElementById(panelId)) return;
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.id = panelId;
        panel.setAttribute('role', 'tabpanel');
        panel.setAttribute('data-screen-label', cfg.label + ' panel');
        panel.innerHTML = `
          <div class="overdue-page">
            <div class="overdue-head">
              <h2 class="overdue-title">${escapeHtml(cfg.label)}</h2>
              <div class="overdue-actions">
                <button type="button" class="cal-btn" data-act="refresh">↻ Refresh</button>
                <button type="button" class="cal-btn" data-act="toggle">Settings</button>
              </div>
            </div>
            <div class="overdue-settings" data-role="settings" style="display:none">
              <h3>ClickUp connection</h3>
              <label>Personal API Token (shared across all ClickUp tabs)
                <input type="password" data-role="token" autocomplete="off" spellcheck="false" />
              </label>
              <label>View URL or View ID for ${escapeHtml(cfg.label)}
                <input type="text" data-role="view" autocomplete="off" spellcheck="false" placeholder="https://app.clickup.com/.../v/li/&lt;id&gt;" />
              </label>
              <div style="display:flex; gap:8px; margin-top:6px;">
                <button type="button" class="cal-btn primary" data-act="save">Save &amp; reload</button>
                <button type="button" class="cal-btn" data-act="reset">Reset to defaults</button>
              </div>
            </div>
            <div class="overdue-status" data-role="status">Click the ${escapeHtml(cfg.label)} tab to load tasks.</div>
            <div class="overdue-list" data-role="list"></div>
          </div>
        `;
        page.appendChild(panel);
      }

      async function loadTasks() {
        const status = q('status');
        const list = q('list');
        if (!status || !list) return;
        status.classList.remove('is-err');
        status.textContent = 'Loading from ClickUp…';
        list.innerHTML = '';

        const token  = getToken();
        const viewId = extractViewId(getViewId());
        if (!token || !viewId) {
          status.classList.add('is-err');
          status.innerHTML = 'Missing API token or View ID. Open <b>Settings</b> to configure.';
          return;
        }
        try {
          let all = [];
          let page = 0;
          while (true) {
            const url = `https://api.clickup.com/api/v2/view/${encodeURIComponent(viewId)}/task?page=${page}`;
            const res = await fetch(url, { headers: { 'Authorization': token } });
            if (!res.ok) {
              const txt = await res.text();
              throw new Error(`HTTP ${res.status} — ${txt.slice(0, 300)}`);
            }
            const data = await res.json();
            const tasks = data.tasks || [];
            all = all.concat(tasks);
            if (tasks.length < 30 || data.last_page) break;
            page++;
            if (page > 20) break;
          }
          renderTasks(all);
          status.textContent = `${all.length} task${all.length === 1 ? '' : 's'} · refreshed ${new Date().toLocaleTimeString()}`;
        } catch (e) {
          status.classList.add('is-err');
          status.innerHTML = `<b>Couldn't reach ClickUp.</b> ${escapeHtml(e.message)}<br>` +
            `Common causes: the View ID isn't the API view ID (try the URL from inside the ClickUp app, not the public share URL), or the API token doesn't have access. Use <b>Settings</b> to update.`;
        }
      }

      function renderTasks(tasks) {
        const list = q('list');
        if (!tasks.length) {
          list.innerHTML = `<div class="overdue-empty">${escapeHtml(cfg.emptyText || 'Nothing here. 🎉')}</div>`;
          return;
        }
        const groups = new Map();
        tasks.forEach((t) => {
          const names = (t.assignees || []).map((a) => a.username).sort();
          const key = names.length ? names.join(', ') : 'Unassigned';
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(t);
        });
        const html = [];
        for (const [groupKey, items] of groups) {
          html.push(`
            <div class="overdue-group-head">
              <span class="overdue-group-name">${escapeHtml(groupKey)}</span>
              <span class="overdue-group-count">${items.length}</span>
            </div>
          `);
          items.forEach((t) => {
            const statusName  = t.status && t.status.status ? t.status.status : '';
            const statusColor = t.status && t.status.color  ? t.status.color  : '#6c6f7a';
            const due = t.due_date ? fmtDate(t.due_date) : '';
            const client = getCustomField(t, 'client');
            const clientChip = client
              ? `<span class="overdue-row-client" style="background:${escapeHtml(client.color)}">${escapeHtml(client.label)}</span>`
              : '<span></span>';
            html.push(`
              <a class="overdue-row" href="${escapeHtml(t.url || '#')}" target="_blank" rel="noopener">
                <span class="overdue-row-name">${escapeHtml(t.name || 'Untitled task')}</span>
                <span class="overdue-row-due">${escapeHtml(due)}</span>
                <span class="overdue-row-status" style="background:${escapeHtml(statusColor)}">${escapeHtml(statusName)}</span>
                ${clientChip}
              </a>
            `);
          });
        }
        list.innerHTML = html.join('');
      }

      function wireUp() {
        const settingsPanel = q('settings');
        const tokenInp = q('token');
        const viewInp  = q('view');
        tokenInp.value = getToken();
        viewInp.value  = getViewId();
        qa('refresh').addEventListener('click', loadTasks);
        qa('toggle').addEventListener('click', () => {
          settingsPanel.style.display = settingsPanel.style.display === 'none' ? 'block' : 'none';
        });
        qa('save').addEventListener('click', () => {
          setToken(tokenInp.value.trim());
          const v = viewInp.value.trim();
          if (v && v !== cfg.defaultView) localStorage.setItem(VIEW_KEY, v);
          else localStorage.removeItem(VIEW_KEY);
          settingsPanel.style.display = 'none';
          loadTasks();
        });
        qa('reset').addEventListener('click', () => {
          localStorage.removeItem(TOKEN_KEY);
          localStorage.removeItem(VIEW_KEY);
          tokenInp.value = DEFAULT_TOKEN;
          viewInp.value  = cfg.defaultView;
          loadTasks();
        });
      }
    }

    const overdueIcon = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 15 14"></polyline></svg>';
    const weekIcon    = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="17" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="16" y1="2" x2="16" y2="6"></line></svg>';

    mountTab({
      key: 'overdue',
      label: 'Overdue',
      icon: overdueIcon,
      defaultView: '130zht-46298',
      emptyText: 'Nothing overdue. 🎉',
    });
    mountTab({
      key: 'thisweek',
      label: 'This Week',
      icon: weekIcon,
      defaultView: '7-36732473-1',
      emptyText: 'Nothing scheduled this week.',
    });
  })();
</script>

<!-- jspreadsheet CE: Excel-like grid with formulas for the home money sheet -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites@5/dist/jsuites.min.css" />

<style>

<script>
  /* =====================================================================
     Money sheet — Google-Sheets-style P&L on the Home tab. Powered by
     jspreadsheet CE so formulas (=SUM, =B10-B34, etc.) work natively.
     Cascade strip in the header reads computed totals from fixed cells
     (B10 = total revenue, B34 = total costs, F5/F6/F7 = take-home /
     weekly / yearly) so the at-a-glance summary stays in sync.
     Storage key: pc-ops::vpm::moneysheet::v1
     ===================================================================== */
  (function bootMoneySheet() {
    return; // disabled — Money sheet was removed from Home; kept code intact in case it's revived later.
    const STORE_KEY = 'pc-ops::vpm::moneysheet::v1';
    let sheet = null;

    function init(attempt) {
      const homePanel = document.getElementById('panel-home');
      if (!homePanel || typeof window.jspreadsheet === 'undefined') {
        if ((attempt || 0) > 60) return;
        return setTimeout(() => init((attempt || 0) + 1), 100);
      }
      // Clean up any old money-snapshot DOM from previous versions.
      const stale = document.getElementById('money-snapshot');
      if (stale) stale.remove();
      if (document.getElementById('money-sheet')) return;

      const card = document.createElement('section');
      card.id = 'money-sheet';
      card.className = 'money-snapshot';
      card.setAttribute('data-screen-label', 'Money sheet');
      card.innerHTML = `
        <div class="money-snapshot-head">
          <button type="button" class="ms-toggle" data-act="toggle" aria-expanded="false">
            <svg class="ms-chev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg>
            <h3>Money sheet · this month</h3>
          </button>
          <div class="ms-head-actions">
            <button type="button" class="ms-link" data-act="reset">
</button>
          </div>
        </div>
        <div class="money-sheet-host" id="money-sheet-host"></div>
      `;
      homePanel.insertBefore(card, homePanel.firstChild);

      // Collapsible: remember state in localStorage, default collapsed.
      const COLLAPSE_KEY = STORE_KEY + '::collapsed';
      const startCollapsed = localStorage.getItem(COLLAPSE_KEY) !== '0';
      if (startCollapsed) card.classList.add('is-collapsed');
      const toggleBtn = card.querySelector('[data-act="toggle"]');
      toggleBtn.setAttribute('aria-expanded', String(!startCollapsed));
      toggleBtn.addEventListener('click', () => {
        const collapsed = !card.classList.contains('is-collapsed');
        card.classList.toggle('is-collapsed', collapsed);
        toggleBtn.setAttribute('aria-expanded', String(!collapsed));
        localStorage.setItem(COLLAPSE_KEY, collapsed ? '1' : '0');
      });

      card.querySelector('[data-act="reset"]').addEventListener('click', () => {
        if (!confirm('Reset Money sheet to the default template? Your edits will be lost.')) return;
        localStorage.removeItem(STORE_KEY);
        rebuild(defaultSheet());
      });

      const stored = loadSheet();
      rebuild(stored || defaultSheet());
    }
    init();

    function rebuild(cfg) {
      const host = document.getElementById('money-sheet-host');
      if (!host) return;
      host.innerHTML = '';
      sheet = jspreadsheet(host, {
        data: cfg.data,
        style: cfg.style || {},
        columns: cfg.columns,
        minDimensions: [9, 36],
        defaultColWidth: 110,
        tableOverflow: false,
        tableWidth: '100%',
        toolbar: [
          { type: 'i', content: 'undo',                onclick: function () { sheet && sheet.undo(); } },
          { type: 'i', content: 'redo',                onclick: function () { sheet && sheet.redo(); } },
          { type: 'i', content: 'save',                onclick: function () { sheet && sheet.download && sheet.download(); } },
          { type: 'select', k: 'font-family', v: ['Default','Arial','Verdana','Helvetica','Tahoma','Times New Roman','Courier','Georgia'] },
          { type: 'select', k: 'font-size',   v: ['9px','10px','11px','12px','13px','14px','16px','18px','20px','24px','28px','32px','40px'] },
          { type: 'i', content: 'format_align_left',   k: 'text-align', v: 'left' },
          { type: 'i', content: 'format_align_center', k: 'text-align', v: 'center' },
          { type: 'i', content: 'format_align_right',  k: 'text-align', v: 'right' },
          { type: 'i', content: 'format_bold',         k: 'font-weight', v: 'bold' },
          { type: 'color',  content: 'format_color_text', k: 'color' },
          { type: 'color',  content: 'format_color_fill', k: 'background-color' },
          { type: 'i', content: 'keyboard_arrow_left',  tooltip: 'Insert column before', onclick: function () {
              if (!sheet) return;
              const sel = sheet.getSelectedColumns(true);
              const idx = sel.length ? Math.min.apply(null, sel) : 0;
              sheet.insertColumn(1, idx, true);  // insertBefore = true
            }
          },
          { type: 'i', content: 'keyboard_arrow_right', tooltip: 'Insert column after',  onclick: function () {
              if (!sheet) return;
              const sel = sheet.getSelectedColumns(true);
              const idx = sel.length ? Math.max.apply(null, sel) : (sheet.getData()[0].length - 1);
              sheet.insertColumn(1, idx, false); // insertBefore = false
            }
          },
          { type: 'i', content: 'keyboard_arrow_up',    tooltip: 'Insert row above', onclick: function () {
              if (!sheet) return;
              const sel = sheet.getSelectedRows(true);
              const idx = sel.length ? Math.min.apply(null, sel) : 0;
              sheet.insertRow(1, idx, true);
            }
          },
          { type: 'i', content: 'keyboard_arrow_down',  tooltip: 'Insert row below', onclick: function () {
              if (!sheet) return;
              const sel = sheet.getSelectedRows(true);
              const idx = sel.length ? Math.max.apply(null, sel) : (sheet.getData().length - 1);
              sheet.insertRow(1, idx, false);
            }
          },
          { type: 'i', content: 'delete', tooltip: 'Delete selected column(s)', onclick: function () {
              if (!sheet) return;
              const sel = sheet.getSelectedColumns(true);
              if (sel.length) sheet.deleteColumn(Math.min.apply(null, sel), sel.length);
            }
          },
        ],
        allowComments: true,
        editable: true,
        allowExport: true,
        allowToolbar: true,
        allowInsertColumn: true,
        allowInsertRow: true,
        allowDeleteColumn: true,
        allowDeleteRow: true,
        onchange:        save,
        oninsertrow:     save,
        ondeleterow:     save,
        oninsertcolumn:  save,
        ondeletecolumn:  save,
        onmove:          save,
        onmerge:         save,
        onchangestyle:   save,
        onresizecolumn:  save,
        onresizerow:     save,
      });
    }

    function save() {
      if (!sheet) return;
      try {
        const snapshot = {
          data: sheet.getData(),
          style: sheet.getStyle ? sheet.getStyle() : {},
          columns: sheet.options.columns || [],
        };
        localStorage.setItem(STORE_KEY, JSON.stringify(snapshot));
      } catch (e) { /* ignore */ }
    }

    function loadSheet() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.data)) return null;
        return parsed;
      } catch (e) { return null; }
    }

    /* ----------------------------------------------------------------
       Cascade strip in the header — reads computed values from known
       cells: B10 = total revenue, B34 = total costs, F2-F7 = profit
       block, plus a derived weekly.
       ----------------------------------------------------------------*/
    function toNum(v) {
      if (v == null || v === '') return 0;
      if (typeof v === 'number') return v;
      const s = String(v).replace(/[,$\s%]/g, '');
      const n = parseFloat(s);
      return isNaN(n) ? 0 : n;
    }
    function fmt(n) {
      const abs = Math.abs(n);
      if (abs >= 1000) return (n < 0 ? '-' : '') + '$' + Math.round(abs).toLocaleString();
      return (n < 0 ? '-' : '') + '$' + abs.toFixed(0);
    }
    function cell(addr) {
      if (!sheet || !sheet.getValueFromCoords) return '';
      // Convert 'B10' to (col, row) zero-indexed
      const m = String(addr).match(/^([A-Z]+)(\d+)$/);
      if (!m) return '';
      const col = m[1].split('').reduce((a, c) => a * 26 + (c.charCodeAt(0) - 64), 0) - 1;
      const row = parseInt(m[2], 10) - 1;
      try { return sheet.getValueFromCoords(col, row); } catch (e) { return ''; }
    }

    function refreshFlow() {
      const flow = document.getElementById('money-flow');
      if (!flow) return;
      // Pull computed values from known cells
      const totalRev    = toNum(cell('B10'));
      const totalCosts  = toNum(cell('B34'));
      const grossProfit = toNum(cell('F2'));
      const tax         = toNum(cell('F3'));
      const sup         = toNum(cell('F4'));
      const monthly     = toNum(cell('F5'));
      const weekly      = toNum(cell('F6'));
      const yearly      = toNum(cell('F7'));
      const step = (cls, label, amount, sep) => `
        <div class="money-flow-step ${cls}">
          <span class="mfs-label">${label}</span>
          <span class="mfs-amount">${fmt(amount)}</span>
        </div>
        ${sep ? `<span class="money-flow-sep ${sep.cls || ''}">${sep.text}</span>` : ''}
      `;
      flow.innerHTML = [
        step('is-rev',    'Revenue',  totalRev,    { text: '−', cls: 'is-minus' }),
        step('is-cost',   'Costs',    totalCosts,  { text: '=' }),
        step('is-profit', 'Profit',   grossProfit, { text: '−', cls: 'is-minus' }),
        step('is-super',  'Super',    sup,         { text: '−', cls: 'is-minus' }),
        step('is-tax',    'Tax',      tax,         { text: '=' }),
        step('is-month',  'Monthly',  monthly,     null),
        `<span class="money-flow-sep">·</span>`,
        step('is-pay',    'Weekly',   weekly,      null),
        `<span class="money-flow-sep">·</span>`,
        step('is-pay',    'Yearly',   yearly,      null),
      ].join('');
    }

    window.addEventListener('beforeunload', save);
    window.addEventListener('pagehide',     save);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') save();
    });

    /* Wheel-passthrough: when the page is the natural scroller (not the
       spreadsheet itself), forward wheel events from inside the sheet
       up to window.scrollBy so the user isn't stuck. We only do this
       when no cell is being actively dragged-edited. */
    document.addEventListener('wheel', (e) => {
      const host = document.getElementById('money-sheet-host');
      if (!host || !host.contains(e.target)) return;
      // If the spreadsheet itself is the scroll container (e.g. it
      // overflows horizontally and the user is scrolling left/right),
      // let it handle. For vertical wheel deltas, scroll the window.
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        // Don't preventDefault — just nudge the page.
        window.scrollBy({ top: e.deltaY, left: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
      }
    }, { passive: true });

    /* ----------------------------------------------------------------
       Default template — mirrors the Google Sheet layout the user
       shared: A/B = revenue + costs, C = notes, D/E = debts,
       E-H = profit block.
       ----------------------------------------------------------------*/
    function defaultSheet() {
      const blank = (r, c) => Array.from({ length: r }, () => Array(c).fill(''));
      const d = blank(36, 9);

      // Row 1 — header bar
      d[0][0] = 'EXPECTED REVENUE';
      d[0][2] = 'NOTES';
      d[0][4] = 'EXPECTED PROFIT';
      d[0][6] = '% OF REV';
      d[0][7] = 'GOAL';

      // Revenue items 2..8
      const rev = [
        ['☑ Nameet (LC, BOHO, MLC)', 7000],
        ['☑ Eskimo Heat',            2200],
        ['☑ Fudge Gifts',            1760],
        ['☑ Elite Collectors Site',  1100],
        ['☑ Orro and Co Site',       1500],
        ['☑ Jan Legal',               650],
        ['☑ Karina Doc',              990],
      ];
      rev.forEach((r, i) => { d[i+1][0] = r[0]; d[i+1][1] = r[1]; });
      d[2][2] = '*if I hit 200k';

      // Row 10 — TOTAL REVENUE
      d[9][0] = 'TOTAL REVENUE';
      d[9][1] = '=SUM(B2:B9)';

      // Profit block (E2..H7)
      d[1][4] = 'GROSS PROFIT';        d[1][5] = '=B10-B34';        d[1][6] = '=F2/B10';
      d[2][4] = 'LESS TAX 20%';        d[2][5] = '=F2*0.2';         d[2][6] = '=F3/B10';

     scaled content with zero leftover grey space. Width handled by JS. */
  #gsheet-embed .gs-body {
