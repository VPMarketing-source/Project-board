<script>
  /* =====================================================================
     Embedded Google Sheet section on Home. The user supplies a sheet URL
     (their "Anyone with the link" share URL); we transform it into an
     iframe-friendly /preview URL and let them resize the height.
     Storage key: pc-ops::vpm::gsheet::v1
     ===================================================================== */
  (function bootGSheetEmbed() {
    const URL_KEY    = 'pc-ops::vpm::gsheet::url::v1';
    const HEIGHT_KEY = 'pc-ops::vpm::gsheet::height::v1';
    const COLLAPSE_KEY = 'pc-ops::vpm::gsheet::collapsed::v1';
    const DEFAULT_URL = 'https://docs.google.com/spreadsheets/d/1pJBCe4-oYz5RMXPfv17OY3bc4Id5Xagy62TR34Rbn0o/edit?gid=1575305625#gid=1575305625';

    function getUrl()    { return localStorage.getItem(URL_KEY)    || DEFAULT_URL; }
    function getHeight() { return parseInt(localStorage.getItem(HEIGHT_KEY), 10) || 720; }

    /* Convert a normal Google Sheets URL into an embed-friendly one.
       Uses the /edit endpoint with widget=true so the user can edit
       cells directly (when signed in with edit access). Falls back to
       /htmlembed/pubhtml for published-to-web URLs. */
    function toEmbedUrl(raw) {
      try {
        const u = new URL(raw);
        if (!/docs\.google\.com$/.test(u.hostname)) return raw;
        const publishedMatch = u.pathname.match(/\/spreadsheets\/d\/e\/([^/]+)/);
        if (publishedMatch) {
          let url = `https://docs.google.com/spreadsheets/d/e/${publishedMatch[1]}/pubhtml`;
          const gid = u.searchParams.get('gid') || (u.hash.match(/gid=(\d+)/) || [])[1];
          if (gid) url += `?gid=${gid}&single=true&widget=false&headers=false`;
          else      url += `?widget=false&headers=false`;
          return url;
        }
        const m = u.pathname.match(/\/spreadsheets\/d\/([^/]+)/);
        if (!m) return raw;
        const id = m[1];
        let gid = u.searchParams.get('gid');
        if (!gid && u.hash) {
          const hm = u.hash.match(/gid=(\d+)/);
          if (hm) gid = hm[1];
        }
        // /edit with widget=true&headers=false keeps cells editable but
        // hides the Google Sheets top toolbar / menu chrome.
        let embed = `https://docs.google.com/spreadsheets/d/${id}/edit?usp=sharing&widget=true&headers=false&rm=minimal`;
        if (gid) embed += `&gid=${gid}#gid=${gid}`;
        return embed;
      } catch (e) { return raw; }
    }

    function mount(attempt) {
      const homePanel = document.getElementById('panel-home');
      if (!homePanel) {
        if ((attempt || 0) > 30) return;
        return setTimeout(() => mount((attempt || 0) + 1), 100);
      }
      if (document.getElementById('gsheet-embed')) return;
      const card = document.createElement('section');
      card.id = 'gsheet-embed';
      card.setAttribute('data-screen-label', 'Google sheet');
      card.innerHTML = `
        <div class="gs-head">
          <button type="button" class="gs-toggle" data-act="toggle" aria-expanded="false">
            <svg class="gs-chev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg>
            <h3>Budget · Google Sheet</h3>
          </button>
          <div class="gs-actions">
            <button type="button" class="gs-link" data-act="open">Open in Google Sheets ↗</button>
            <button type="button" class="gs-link" data-act="settings">Change link</button>
          </div>
        </div>
        <div class="gs-settings" data-role="settings" style="display:none">
          <label>Google Sheet URL
            <input type="text" data-role="url" spellcheck="false" placeholder="https://docs.google.com/spreadsheets/d/..." />
          </label>
          <label>Embed height (px)
            <input type="number" data-role="height" min="200" max="2000" step="20" />
          </label>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button type="button" class="gs-link" data-act="save">Save</button>
            <button type="button" class="gs-link" data-act="cancel">Cancel</button>
          </div>
        </div>
        <div class="gs-body" data-role="body"></div>
      `;
      // Slot in directly after the Money sheet card if it exists.
      const money = document.getElementById('money-sheet');
      if (money && money.nextSibling) homePanel.insertBefore(card, money.nextSibling);
      else if (money) homePanel.appendChild(card);
      else homePanel.insertBefore(card, homePanel.firstChild);

      // Wire up
      const startCollapsed = localStorage.getItem(COLLAPSE_KEY) === '1';
      if (startCollapsed) card.classList.add('is-collapsed');
      const toggleBtn = card.querySelector('[data-act="toggle"]');
      toggleBtn.setAttribute('aria-expanded', String(!startCollapsed));
      toggleBtn.addEventListener('click', () => {
        const collapsed = !card.classList.contains('is-collapsed');
        card.classList.toggle('is-collapsed', collapsed);
        toggleBtn.setAttribute('aria-expanded', String(!collapsed));
        localStorage.setItem(COLLAPSE_KEY, collapsed ? '1' : '0');
        if (!collapsed) ensureIframe();
      });

      card.querySelector('[data-act="open"]').addEventListener('click', () => {
        window.open(getUrl(), '_blank', 'noopener');
      });
      card.querySelector('[data-act="settings"]').addEventListener('click', () => {
        const panel = card.querySelector('[data-role="settings"]');
        panel.querySelector('[data-role="url"]').value = getUrl();
        panel.querySelector('[data-role="height"]').value = getHeight();
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      });
      card.querySelector('[data-act="save"]').addEventListener('click', () => {
        const panel = card.querySelector('[data-role="settings"]');
        const url = panel.querySelector('[data-role="url"]').value.trim();
        const h   = parseInt(panel.querySelector('[data-role="height"]').value, 10);
        if (url) localStorage.setItem(URL_KEY, url);
        if (h)   localStorage.setItem(HEIGHT_KEY, String(h));
        panel.style.display = 'none';
        const body = card.querySelector('[data-role="body"]');
        body.innerHTML = '';
        ensureIframe();
      });
      card.querySelector('[data-act="cancel"]').addEventListener('click', () => {
        card.querySelector('[data-role="settings"]').style.display = 'none';
      });

      if (!startCollapsed) ensureIframe();
    }

    function ensureIframe() {
      const body = document.querySelector('#gsheet-embed [data-role="body"]');
      if (!body) return;
      if (body.querySelector('iframe')) { fitScale(); return; }
      const iframe = document.createElement('iframe');
      iframe.src = toEmbedUrl(getUrl());
      iframe.setAttribute('loading', 'lazy');
      iframe.setAttribute('allow', 'clipboard-read; clipboard-write');
      body.appendChild(iframe);
      fitScale();
    }

    /* Fit-to-width: measure container, compute scale so the iframe's
       fixed content width exactly matches it, and set CSS vars so
       both the transform and the wrapper height update together. */
    function fitScale() {
      const card = document.getElementById('gsheet-embed');
      const body = card && card.querySelector('[data-role="body"]');
      if (!card || !body) return;
      const iframeW = 2560;
      const iframeH = 1500;
      // Subtract 2px to guarantee no sub-pixel horizontal overflow.
      const containerW = (body.clientWidth || card.clientWidth || 1480) - 2;
      const scale = Math.min(1, containerW / iframeW);
      card.style.setProperty('--gs-iframe-w', iframeW + 'px');
      card.style.setProperty('--gs-iframe-h', iframeH + 'px');
      card.style.setProperty('--gs-scale', String(scale));
    }
    window.addEventListener('resize', () => fitScale());

    mount();
  })();
</script>
