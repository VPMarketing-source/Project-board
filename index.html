<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VP Marketing — Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<script src="shared/clients.js"></script>
<style>
  :root {
    --bg:        #f6f1e2;
    --surface:   #ffffff;
    --ink:       #2b2f3a;
    --ink-mute:  #6b7080;
    --line:      #ebe6d4;
    --accent:    #a86b14;
    --accent-bg: #fbf3da;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 64px 24px 80px;
  }
  header.hello {
    margin-bottom: 36px;
  }
  .hello-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .hello-title {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.15;
    margin: 0 0 6px;
  }
  .hello-sub {
    color: var(--ink-mute);
    font-size: 14px;
    margin: 0;
  }

  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 32px 0 14px;
  }
  .section-title {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
  }
  .section-count {
    font-size: 12px;
    color: var(--ink-mute);
  }

  .top-stamp {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin: 0 0 28px;
  }

  .tile-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  /* Pinned (personal/agency) tiles sit side-by-side */
  #pinned-grid {
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  @media (max-width: 600px) {
    #pinned-grid { grid-template-columns: 1fr; }
  }
  .tile-grid + .tile-divider {
    margin: 22px 0 16px;
  }
  .tile-divider {
    border: 0;
    border-top: 1px solid #d6cca8;
    margin: 0 0 16px;
  }

  /* Condensed list — used for the Clients section */
  .client-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .client-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 18px;
    padding: 10px 4px;
    text-decoration: none;
    color: var(--ink);
    border-bottom: 1px solid transparent;
    transition: color 120ms ease, border-color 120ms ease, padding-left 160ms ease;
  }
  .client-row:hover {
    color: var(--accent);
    border-bottom-color: rgba(168,107,20,0.18);
    padding-left: 8px;
  }
  .client-row-name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.005em;
    line-height: 1.2;
  }
  .client-row-meta {
    font-size: 12px;
    color: var(--ink-mute);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .client-row-meta .tile-meta-dot { background: #cfd2db; }
  .client-list + .tile-divider { margin: 10px 0; }
  .tile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    position: relative;
    overflow: hidden;
  }
  .tile-num {
    flex: 0 0 auto;
    width: 22px;
    text-align: right;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-mute);
    font-variant-numeric: tabular-nums;
    position: relative;
    z-index: 1;
  }
  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: linear-gradient(135deg, var(--accent-tile, var(--accent-bg)) 0%, transparent 55%);
    opacity: 0.65;
  }
  .tile:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(17,19,26,0.08);
    border-color: rgba(168,107,20,0.35);
  }
  .tile-avatar {
    flex: 0 0 auto;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #f1ecdc;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.04em;
    position: relative;
    z-index: 1;
  }
  .tile-body {
    flex: 1 1 auto;
    min-width: 0;
    position: relative;
    z-index: 1;
  }
  .tile-name {
    font-weight: 600;
    font-size: 14px;
    margin: 0 0 1px;
    line-height: 1.2;
  }
  .tile-sub {
    font-size: 11px;
    color: var(--ink-mute);
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .tile-meta {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--ink-mute);
    margin-left: auto;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .tile-meta-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #cfd2db;
  }
  .tile-meta-dot.is-fresh   { background: #16a34a; }
  .tile-meta-dot.is-recent  { background: #d4a017; }
  .tile-meta-dot.is-stale   { background: #b86040; }

  .hint {
    margin-top: 28px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px dashed var(--line);
    border-radius: 12px;
    color: var(--ink-mute);
    font-size: 13px;
    line-height: 1.5;
  }
  .hint code {
    background: #f4eedb;
    color: #6b4a13;
    padding: 1px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', Menlo, monospace;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-stamp">VS Code · Vercel</div>

  <div class="tile-grid" id="pinned-grid"></div>

  <div class="section-head">
    <div class="section-title">Clients</div>
    <div class="section-count" id="clients-count"></div>
  </div>

  <div id="tile-groups"></div>

</div>

<script>
(function bootHome() {
  const SUPABASE_URL = 'https://rqlrpxxkskqxpjgiqyql.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxbHJweHhrc2txeHBqZ2lxeXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5Mjc3OTYsImV4cCI6MjA5NTUwMzc5Nn0.RG7fzJxp_SoSMNxHlkfLgrAx7ycupmt0jEDm3q9XHBE';

  const groupsEl = document.getElementById('tile-groups');
  const pinnedEl = document.getElementById('pinned-grid');
  const countEl = document.getElementById('clients-count');
  const registry = window.CLIENTS_REGISTRY || [];
  const lastTouchedByClient = {};
  const pinnedEntries = registry.filter((e) => !e.divider && e.pinned);
  const mainRegistry  = registry.filter((e) => !e.pinned);
  const clientEntries = mainRegistry.filter((e) => !e.divider);

  function escape(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function timeAgo(iso) {
    if (!iso) return 'No activity yet';
    const then = new Date(iso).getTime();
    if (!then) return 'No activity yet';
    const diff = Date.now() - then;
    const min = 60 * 1000, hour = 60 * min, day = 24 * hour, week = 7 * day;
    if (diff < min)         return 'Just now';
    if (diff < hour)        return Math.floor(diff / min) + 'm ago';
    if (diff < day)         return Math.floor(diff / hour) + 'h ago';
    if (diff < week)        return Math.floor(diff / day) + 'd ago';
    if (diff < 4 * week)    return Math.floor(diff / week) + 'w ago';
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function freshness(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const day = 86400000;
    if (diff < 2 * day)  return 'is-fresh';
    if (diff < 7 * day)  return 'is-recent';
    return 'is-stale';
  }

  function tileHtml(c, num) {
    const last = lastTouchedByClient[c.id];
    const accentTile = c.accent ? hexToTint(c.accent) : 'var(--accent-bg)';
    const numHtml = num != null ? `<span class="tile-num">${num}.</span>` : '';
    return `
      <a class="tile" href="${escape(c.href)}" style="--accent-tile:${escape(accentTile)}">
        ${numHtml}
        <span class="tile-avatar" style="color:${escape(c.accent || 'var(--accent)')}">${escape(c.initials || '')}</span>
        <span class="tile-body">
          <p class="tile-name">${escape(c.name || c.id)}</p>
          ${c.sub ? `<p class="tile-sub">${escape(c.sub)}</p>` : ''}
        </span>
        <span class="tile-meta">
          <span class="tile-meta-dot ${freshness(last)}"></span>
          <span>${escape(timeAgo(last))}</span>
        </span>
      </a>
    `;
  }

  function rowHtml(c) {
    const last = lastTouchedByClient[c.id];
    return `
      <a class="client-row" href="${escape(c.href)}">
        <span class="client-row-name">${escape(c.name || c.id)}</span>
        <span class="client-row-meta">
          <span class="tile-meta-dot ${freshness(last)}"></span>
          <span>${escape(timeAgo(last))}</span>
        </span>
      </a>
    `;
  }

  function renderTiles() {
    countEl.textContent = clientEntries.length + (clientEntries.length === 1 ? ' space' : ' spaces');

    pinnedEl.innerHTML = pinnedEntries.map((c) => tileHtml(c)).join('');
    pinnedEl.style.marginBottom = pinnedEntries.length ? '32px' : '0';

    // Split main registry into groups around { divider: true } entries.
    // Numbering is continuous across groups, only counts client entries.
    const groups = [[]];
    let n = 0;
    mainRegistry.forEach((entry) => {
      if (entry.divider) { groups.push([]); return; }
      n += 1;
      groups[groups.length - 1].push({ entry, num: n });
    });

    groupsEl.innerHTML = groups
      .filter((g) => g.length > 0)
      .map((g, i) => {
        const grid = `<div class="tile-grid">${g.map((x) => tileHtml(x.entry, x.num)).join('')}</div>`;
        return i === 0 ? grid : `<hr class="tile-divider" />${grid}`;
      })
      .join('');
  }

  function hexToTint(hex) {
    // Build a soft pastel tint from a brand hex by mixing toward white.
    const h = hex.replace('#', '');
    if (h.length !== 6) return 'var(--accent-bg)';
    const r = parseInt(h.slice(0, 2), 16);
    const g = parseInt(h.slice(2, 4), 16);
    const b = parseInt(h.slice(4, 6), 16);
    const mix = (c) => Math.round(c + (255 - c) * 0.88);
    return `rgb(${mix(r)}, ${mix(g)}, ${mix(b)})`;
  }

  renderTiles();

  // Fetch the latest updated_at per client from Supabase.
  fetch(`${SUPABASE_URL}/rest/v1/planner_state?select=client_id,updated_at&order=updated_at.desc`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
    },
  })
  .then((r) => r.ok ? r.json() : Promise.reject(r.status))
  .then((rows) => {
    rows.forEach((row) => {
      if (!lastTouchedByClient[row.client_id]) {
        lastTouchedByClient[row.client_id] = row.updated_at;
      }
    });
    renderTiles();
  })
  .catch(() => { /* fail silent — tiles still render without last-touched */ });
})();
</script>
</body>
</html>
